services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - ${APP_ENV_FILE:-.env.production}
    environment:
      NODE_ENV: production
      PORT: 3000
      REDIS_HOST: valkey
      REDIS_PORT: 6379
      REDIS_URL: redis://valkey:6379
    depends_on:
      - valkey
    restart: unless-stopped
    expose:
      - "3000"

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
    env_file:
      - ${APP_ENV_FILE:-.env.production}
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
    depends_on:
      - api
    restart: unless-stopped
    expose:
      - "3001"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    env_file:
      - ${APP_ENV_FILE:-.env.production}
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
    depends_on:
      - api
    restart: unless-stopped
    expose:
      - "3002"

  valkey:
    image: valkey/valkey:8.1-alpine
    command: ["valkey-server", "--appendonly", "yes", "--save", "60", "1000"]
    restart: unless-stopped
    expose:
      - "6379"
    volumes:
      - valkey_data:/data

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - api
      - admin
      - web
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  valkey_data:

services:
  api:
    image: ${API_IMAGE:-opensocial-api}
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - ${APP_ENV_FILE:-.env.production}
    environment:
      NODE_ENV: production
      PORT: 3000
      REDIS_HOST: valkey
      REDIS_PORT: 6379
      REDIS_URL: redis://valkey:6379
    depends_on:
      - valkey
    restart: unless-stopped
    expose:
      - "3000"

  admin:
    image: ${ADMIN_IMAGE:-opensocial-admin}
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
    env_file:
      - ${APP_ENV_FILE:-.env.production}
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
    depends_on:
      - api
    restart: unless-stopped
    expose:
      - "3001"

  web:
    image: ${WEB_IMAGE:-opensocial-web}
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    env_file:
      - ${APP_ENV_FILE:-.env.production}
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
    depends_on:
      - api
    restart: unless-stopped
    expose:
      - "3002"

  docs:
    image: ${DOCS_IMAGE:-opensocial-docs}
    build:
      context: .
      dockerfile: apps/docs/Dockerfile
    environment:
      NODE_ENV: production
    restart: unless-stopped
    expose:
      - "3003"

  valkey:
    image: valkey/valkey:8.1-alpine
    command: ["valkey-server", "--appendonly", "yes", "--save", "60", "1000"]
    restart: unless-stopped
    expose:
      - "6379"
    volumes:
      - valkey_data:/data

  nginx:
    image: caddy:2.10-alpine
    depends_on:
      - api
      - admin
      - web
      - docs
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      CADDY_EMAIL: ${CADDY_EMAIL:-}
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  valkey_data:
  caddy_data:
  caddy_config:

name: CI

on:
  pull_request:
    paths:
      - "apps/**"
      - "packages/**"
      - "prisma/**"
      - "scripts/**"
      - "deploy/**"
      - "docker-compose.yml"
      - "docker-compose.prod.yml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - "tsconfig.base.json"
      - "eslint.config.mjs"
      - ".github/workflows/ci.yml"
  push:
    branches: [main]
    paths:
      - "apps/**"
      - "packages/**"
      - "prisma/**"
      - "scripts/**"
      - "deploy/**"
      - "docker-compose.yml"
      - "docker-compose.prod.yml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - "tsconfig.base.json"
      - "eslint.config.mjs"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.7.1

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile=false

      - name: Generate Prisma Client
        run: pnpm --filter @opensocial/api prisma:generate

      - name: Build shared backend packages
        run: pnpm --filter @opensocial/types build && pnpm --filter @opensocial/openai build

      - name: Lint (API lane)
        run: pnpm turbo run lint --filter=@opensocial/api...

      - name: Typecheck (API lane)
        run: pnpm turbo run typecheck --filter=@opensocial/api...

      - name: DB Drift Check
        run: pnpm db:drift-check

      - name: Test (API lane)
        run: pnpm turbo run test --filter=@opensocial/api...

  web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.7.1

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile=false

      - name: Build shared web packages
        run: pnpm --filter @opensocial/types build

      - name: Generate Next route types
        run: pnpm --filter @opensocial/web exec next typegen && pnpm --filter @opensocial/admin exec next typegen

      - name: Lint (Web/Admin lane)
        run: pnpm turbo run lint --filter=@opensocial/web... --filter=@opensocial/admin...

      - name: Typecheck (Web/Admin lane)
        run: pnpm turbo run typecheck --filter=@opensocial/web... --filter=@opensocial/admin...

      - name: Test (Web/Admin lane)
        run: pnpm turbo run test --filter=@opensocial/web... --filter=@opensocial/admin...

      - name: Install Playwright (Chromium)
        run: pnpm --filter @opensocial/web exec playwright install chromium --with-deps

      - name: Web E2E (design mock)
        run: pnpm --filter @opensocial/web test:e2e

      - name: Install Playwright for Admin (Chromium)
        if: github.event_name == 'workflow_dispatch'
        run: pnpm --filter @opensocial/admin exec playwright install chromium --with-deps

      - name: Admin E2E (sign-in gate baseline)
        if: github.event_name == 'workflow_dispatch'
        run: pnpm --filter @opensocial/admin test:e2e

  format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.7.1

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile=false

      - name: Format check
        run: pnpm format:check

  validate:
    needs: [backend, web, format]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Validate CI job results
        shell: bash
        run: |
          set -euo pipefail
          echo "backend=${{ needs.backend.result }}"
          echo "web=${{ needs.web.result }}"
          echo "format=${{ needs.format.result }}"
          if [[ "${{ needs.backend.result }}" == "failure" || "${{ needs.backend.result }}" == "cancelled" ]]; then
            exit 1
          fi
          if [[ "${{ needs.web.result }}" == "failure" || "${{ needs.web.result }}" == "cancelled" ]]; then
            exit 1
          fi
          if [[ "${{ needs.format.result }}" == "failure" || "${{ needs.format.result }}" == "cancelled" ]]; then
            exit 1
          fi

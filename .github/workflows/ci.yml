name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.7.1

      - name: Install
        run: pnpm install --frozen-lockfile=false

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: DB Drift Check
        run: pnpm db:drift-check

      - name: Test
        run: pnpm test

      - name: Format check
        run: pnpm format:check

      - name: Install Playwright (Chromium)
        run: pnpm --filter @opensocial/web exec playwright install chromium --with-deps

      - name: Web E2E (design mock)
        run: pnpm --filter @opensocial/web test:e2e

name: Backend Ops Drill

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Target environment for the backend ops drill"
        required: false
        default: staging
        type: choice
        options:
          - staging
          - production
      include_prod_smoke:
        description: "Include prod-smoke lane inside ops pack"
        required: false
        default: false
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  backend-ops-drill:
    runs-on: [self-hosted, linux, x64, opensocial-prod]
    environment: ${{ inputs.target == 'production' && 'production' || 'staging' }}
    timeout-minutes: 45
    env:
      STAGING_EQUALS_PROD: ${{ inputs.target == 'staging' && 'true' || 'false' }}
      BACKEND_OPS_TARGET: ${{ inputs.target }}
      BACKEND_OPS_INCLUDE_RELEASE_CHECK: "0"
      BACKEND_OPS_INCLUDE_VERIFICATION: "1"
      BACKEND_OPS_INCLUDE_PROD_SMOKE: ${{ inputs.include_prod_smoke && '1' || '0' }}
      BACKEND_OPS_INCLUDE_MODERATION_DRILL: "1"
      SMOKE_BASE_URL: https://api.opensocial.so
      SMOKE_HOST_HEADER: ${{ secrets.STAGING_SMOKE_HOST_HEADER }}
      SMOKE_ADMIN_USER_ID: ${{ secrets.STAGING_SMOKE_ADMIN_USER_ID || secrets.SMOKE_ADMIN_USER_ID }}
      SMOKE_ADMIN_ROLE: ${{ secrets.STAGING_SMOKE_ADMIN_ROLE || secrets.SMOKE_ADMIN_ROLE || 'admin' }}
      SMOKE_ADMIN_API_KEY: ${{ secrets.STAGING_SMOKE_ADMIN_API_KEY || secrets.SMOKE_ADMIN_API_KEY }}
      SMOKE_ACCESS_TOKEN: ${{ secrets.SMOKE_ACCESS_TOKEN }}
      SMOKE_USER_ID: ${{ secrets.SMOKE_USER_ID }}
      SMOKE_AGENT_THREAD_ID: ${{ secrets.SMOKE_AGENT_THREAD_ID }}
      SMOKE_APPLICATION_KEY: ${{ secrets.STAGING_SMOKE_SESSION_APPLICATION_KEY || secrets.SMOKE_SESSION_APPLICATION_KEY }}
      SMOKE_APPLICATION_TOKEN: ${{ secrets.STAGING_SMOKE_SESSION_APPLICATION_TOKEN || secrets.SMOKE_SESSION_APPLICATION_TOKEN }}
      AGENTIC_VERIFICATION_LANE_ID: ${{ secrets.STAGING_AGENTIC_VERIFICATION_LANE_ID || secrets.AGENTIC_VERIFICATION_LANE_ID || secrets.PROD_AGENTIC_VERIFICATION_LANE_ID }}
      AGENTIC_BENCH_ACCESS_TOKEN: ${{ secrets.AGENTIC_BENCH_ACCESS_TOKEN }}
      AGENTIC_BENCH_USER_ID: ${{ secrets.AGENTIC_BENCH_USER_ID }}
      AGENTIC_BENCH_THREAD_ID: ${{ secrets.AGENTIC_BENCH_THREAD_ID }}
      ONBOARDING_PROBE_TOKEN: ${{ secrets.STAGING_ONBOARDING_PROBE_TOKEN || secrets.ONBOARDING_PROBE_TOKEN || secrets.PROD_ONBOARDING_PROBE_TOKEN }}
      PLAYGROUND_BASE_URL: https://api.opensocial.so
      PLAYGROUND_HOST_HEADER: ${{ secrets.STAGING_SMOKE_HOST_HEADER }}
      PLAYGROUND_ADMIN_USER_ID: ${{ secrets.STAGING_SMOKE_ADMIN_USER_ID || secrets.SMOKE_ADMIN_USER_ID }}
      PLAYGROUND_ADMIN_ROLE: ${{ secrets.STAGING_SMOKE_ADMIN_ROLE || secrets.SMOKE_ADMIN_ROLE || 'admin' }}
      PLAYGROUND_ADMIN_API_KEY: ${{ secrets.STAGING_SMOKE_ADMIN_API_KEY || secrets.SMOKE_ADMIN_API_KEY }}
      PLAYGROUND_BOOTSTRAP_REQUIRED: "0"
      MODERATION_DRILL_ACCESS_TOKEN: ${{ secrets.MODERATION_DRILL_ACCESS_TOKEN || secrets.SMOKE_ACCESS_TOKEN }}
      MODERATION_DRILL_REPORTER_USER_ID: ${{ secrets.MODERATION_DRILL_REPORTER_USER_ID || secrets.SMOKE_USER_ID }}
      MODERATION_DRILL_TARGET_USER_ID: ${{ secrets.MODERATION_DRILL_TARGET_USER_ID || secrets.SMOKE_ADMIN_USER_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Run backend ops drill
        run: |
          set -euo pipefail
          pnpm test:backend:ops-pack

name: Deploy Staging

on:
  workflow_dispatch:
    inputs:
      deploy_mode:
        description: "Deploy from local build or prebuilt images"
        required: false
        default: build
        type: choice
        options:
          - build
          - images
      api_image:
        description: "Optional prebuilt API image reference"
        required: false
        type: string
      admin_image:
        description: "Optional prebuilt admin image reference"
        required: false
        type: string
      web_image:
        description: "Optional prebuilt web image reference"
        required: false
        type: string
      run_post_deploy_verification:
        description: "Run incident-readiness verification after deploy"
        required: false
        default: true
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging
    concurrency:
      group: deploy-staging
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Prepare SSH key
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          echo "${STAGING_SSH_KEY}" > ~/.ssh/staging_key
          chmod 600 ~/.ssh/staging_key
        env:
          STAGING_SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}

      - name: Deploy to staging
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.STAGING_HOST }}
          DEPLOY_USER: ${{ secrets.STAGING_USER }}
          DEPLOY_PATH: ${{ secrets.STAGING_DEPLOY_PATH }}
          SSH_KEY_PATH: ~/.ssh/staging_key
          DEPLOY_MODE: ${{ inputs.deploy_mode }}
          API_IMAGE: ${{ inputs.api_image }}
          ADMIN_IMAGE: ${{ inputs.admin_image }}
          WEB_IMAGE: ${{ inputs.web_image }}
          REGISTRY_HOST: ghcr.io
          REGISTRY_USERNAME: ${{ secrets.GHCR_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.GHCR_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ONBOARDING_LLM_PROVIDER: ${{ secrets.ONBOARDING_LLM_PROVIDER }}
          ONBOARDING_LLM_BASE_URL: ${{ secrets.ONBOARDING_LLM_BASE_URL }}
          ONBOARDING_LLM_API_KEY: ${{ secrets.ONBOARDING_LLM_API_KEY }}
          ONBOARDING_LLM_MODEL: ${{ secrets.ONBOARDING_LLM_MODEL }}
          ONBOARDING_LLM_TIMEOUT_MS: ${{ secrets.ONBOARDING_LLM_TIMEOUT_MS }}
          ONBOARDING_PROBE_TOKEN: ${{ secrets.ONBOARDING_PROBE_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REDIRECT_URI: https://api.opensocial.so/api/auth/google/callback
        run: |
          set -euo pipefail
          chmod +x scripts/deploy-staging.sh
          ./scripts/deploy-staging.sh

      - name: Setup Node (post-deploy verification)
        if: ${{ inputs.run_post_deploy_verification }}
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup pnpm (post-deploy verification)
        if: ${{ inputs.run_post_deploy_verification }}
        uses: pnpm/action-setup@v4
        with:
          version: 10.7.1

      - name: Install deps (post-deploy verification)
        if: ${{ inputs.run_post_deploy_verification }}
        run: pnpm install --frozen-lockfile=false

      - name: Verify incident-readiness gates
        if: ${{ inputs.run_post_deploy_verification }}
        env:
          SMOKE_BASE_URL: ${{ secrets.STAGING_API_BASE_URL }}
          SMOKE_ADMIN_USER_ID: ${{ secrets.STAGING_SMOKE_ADMIN_USER_ID }}
          SMOKE_ADMIN_ROLE: ${{ secrets.STAGING_SMOKE_ADMIN_ROLE }}
          SMOKE_ADMIN_API_KEY: ${{ secrets.STAGING_SMOKE_ADMIN_API_KEY }}
          SMOKE_ACCESS_TOKEN: ${{ secrets.STAGING_SMOKE_ACCESS_TOKEN }}
          SMOKE_TIMEOUT_MS: "15000"
          INCIDENT_VERIFY_REQUIRE_HEALTHY: "true"
          INCIDENT_VERIFY_FAIL_ON_WARNING: "false"
          INCIDENT_VERIFY_RUNBOOKS: "true"
        run: |
          set -euo pipefail
          pnpm staging:verify:incident

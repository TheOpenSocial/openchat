name: Deploy Staging

on:
  workflow_dispatch:
    inputs:
      deploy_mode:
        description: "Deploy from local build or prebuilt images"
        required: false
        default: build
        type: choice
        options:
          - build
          - images
      api_image:
        description: "Optional prebuilt API image reference"
        required: false
        type: string
      admin_image:
        description: "Optional prebuilt admin image reference"
        required: false
        type: string
      web_image:
        description: "Optional prebuilt web image reference"
        required: false
        type: string
      run_post_deploy_verification:
        description: "Run incident-readiness verification after deploy"
        required: false
        default: true
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy-staging:
    runs-on: [self-hosted, linux, x64, opensocial-prod]
    environment: staging
    concurrency:
      group: deploy-staging
      cancel-in-progress: false
    env:
      LOCAL_DEPLOY: ${{ secrets.STAGING_LOCAL_DEPLOY || '0' }}
      DEPLOY_PATH: ${{ secrets.STAGING_DEPLOY_PATH }}
      REMOTE_ENV_FILE: .env.production
      DEPLOY_HOST: ${{ secrets.STAGING_DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.STAGING_DEPLOY_USER || 'ec2-user' }}
      SSH_KEY_PATH: /tmp/staging_deploy_key
      DEPLOY_MODE: ${{ inputs.deploy_mode }}
      DEPLOY_SERVICES: api
      API_IMAGE: ${{ inputs.api_image }}
      ADMIN_IMAGE: ${{ inputs.admin_image }}
      WEB_IMAGE: ${{ inputs.web_image }}
      REGISTRY_HOST: ghcr.io
      REGISTRY_USERNAME: ${{ secrets.GHCR_USERNAME }}
      REGISTRY_PASSWORD: ${{ secrets.GHCR_TOKEN }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ONBOARDING_LLM_MODEL: ${{ secrets.ONBOARDING_LLM_MODEL }}
      ONBOARDING_LLM_FAST_MODEL: ${{ secrets.ONBOARDING_LLM_FAST_MODEL }}
      ONBOARDING_LLM_RICH_MODEL: ${{ secrets.ONBOARDING_LLM_RICH_MODEL }}
      ONBOARDING_LLM_FAST_MODEL_CANDIDATES: ${{ secrets.ONBOARDING_LLM_FAST_MODEL_CANDIDATES }}
      ONBOARDING_LLM_RICH_MODEL_CANDIDATES: ${{ secrets.ONBOARDING_LLM_RICH_MODEL_CANDIDATES }}
      ONBOARDING_LLM_TIMEOUT_MS: ${{ secrets.ONBOARDING_LLM_TIMEOUT_MS }}
      ONBOARDING_LLM_RICH_TIMEOUT_MS: ${{ secrets.ONBOARDING_LLM_RICH_TIMEOUT_MS }}
      ONBOARDING_PROBE_TOKEN: ${{ secrets.ONBOARDING_PROBE_TOKEN }}
      DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL || secrets.DATABASE_URL }}
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      GOOGLE_REDIRECT_URI: https://api.opensocial.so/api/auth/google/callback
      AWS_REGION: ${{ secrets.AWS_REGION }}
      S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
      S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
      S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
      S3_BUCKET: ${{ secrets.S3_BUCKET }}
      MEDIA_CDN_BASE_URL: ${{ secrets.MEDIA_CDN_BASE_URL }}
      S3_PRESIGNED_UPLOADS_ENABLED: ${{ secrets.S3_PRESIGNED_UPLOADS_ENABLED }}
      MEDIA_SIGNING_SECRET: ${{ secrets.MEDIA_SIGNING_SECRET }}
      MEDIA_UPLOAD_SIGNING_SECRET: ${{ secrets.MEDIA_UPLOAD_SIGNING_SECRET }}
      ADMIN_API_KEY: ${{ secrets.STAGING_SMOKE_ADMIN_API_KEY || secrets.SMOKE_ADMIN_API_KEY }}
      PLAYGROUND_ENABLED: "true"
      PLAYGROUND_MUTATIONS_ENABLED: "true"
      PLAYGROUND_ALLOWED_ADMIN_USER_IDS: ${{ secrets.STAGING_SMOKE_ADMIN_USER_ID || secrets.SMOKE_ADMIN_USER_ID }}
      SMOKE_SESSION_APPLICATION_ENABLED: "true"
      SMOKE_SESSION_APPLICATION_KEY: ${{ secrets.STAGING_SMOKE_SESSION_APPLICATION_KEY || secrets.SMOKE_SESSION_APPLICATION_KEY }}
      SMOKE_SESSION_APPLICATION_TOKEN: ${{ secrets.STAGING_SMOKE_SESSION_APPLICATION_TOKEN || secrets.SMOKE_SESSION_APPLICATION_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Prepare deploy SSH key
        if: ${{ env.LOCAL_DEPLOY != '1' }}
        shell: bash
        env:
          STAGING_DEPLOY_SSH_KEY: ${{ secrets.STAGING_DEPLOY_SSH_KEY }}
        run: |
          set -euo pipefail
          if [[ -z "${STAGING_DEPLOY_SSH_KEY:-}" ]]; then
            echo "STAGING_DEPLOY_SSH_KEY secret is required when LOCAL_DEPLOY != 1" >&2
            exit 1
          fi
          printf "%s\n" "$STAGING_DEPLOY_SSH_KEY" > "$SSH_KEY_PATH"
          chmod 600 "$SSH_KEY_PATH"

      - name: Sync deploy workspace
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/deploy-production.sh
          DEPLOY_PHASE=sync ./scripts/deploy-production.sh

      - name: Hydrate DATABASE_URL from existing deploy env (fallback)
        if: ${{ env.DATABASE_URL == '' }}
        shell: bash
        run: |
          set -euo pipefail
          candidate_path="${DEPLOY_PATH}/${REMOTE_ENV_FILE}"
          db_value=""
          if [[ -f "$candidate_path" ]]; then
            db_line="$(grep -m1 '^DATABASE_URL=' "$candidate_path" || true)"
            if [[ -n "$db_line" ]]; then
              db_value="${db_line#DATABASE_URL=}"
            fi
          fi
          if [[ -z "$db_value" && "${LOCAL_DEPLOY:-0}" != "1" ]]; then
            db_line_remote="$(
              ssh -i "$SSH_KEY_PATH" -o BatchMode=yes -o StrictHostKeyChecking=accept-new "${DEPLOY_USER}@${DEPLOY_HOST}" \
                "set -euo pipefail; f='${DEPLOY_PATH}/${REMOTE_ENV_FILE}'; if [[ -f \"\$f\" ]]; then grep -m1 '^DATABASE_URL=' \"\$f\" || true; fi" \
              || true
            )"
            if [[ -n "$db_line_remote" ]]; then
              db_value="${db_line_remote#DATABASE_URL=}"
            fi
          fi
          if [[ -n "$db_value" ]]; then
            echo "DATABASE_URL=$db_value" >> "$GITHUB_ENV"
            echo "Hydrated DATABASE_URL from existing deploy env file."
            exit 0
          fi
          echo "DATABASE_URL fallback not found in local or remote deploy env file."

      - name: Validate required staging deploy secrets
        shell: bash
        run: |
          set -euo pipefail
          missing=0
          if [[ -z "${DATABASE_URL:-}" ]]; then
            echo "Missing DATABASE_URL for staging deploy. Set STAGING_DATABASE_URL (preferred) or DATABASE_URL." >&2
            missing=1
          fi
          if [[ -z "${OPENAI_API_KEY:-}" ]]; then
            echo "Missing OPENAI_API_KEY for staging deploy." >&2
            missing=1
          fi
          if [[ "$missing" -ne 0 ]]; then
            exit 1
          fi

      - name: Reclaim docker space on runner
        shell: bash
        run: |
          set -euo pipefail
          timeout 30s docker system df || true
          timeout 120s docker container prune -f || true
          timeout 180s docker builder prune -af --filter "until=240h" || true
          timeout 180s docker image prune -af --filter "until=240h" || true
          timeout 30s docker system df || true

      - name: Registry login
        if: ${{ inputs.deploy_mode == 'images' }}
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/deploy-production.sh
          DEPLOY_PHASE=registry-login ./scripts/deploy-production.sh

      - name: Pull API image
        if: ${{ inputs.deploy_mode == 'images' }}
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/deploy-production.sh
          DEPLOY_PHASE=pull-api ./scripts/deploy-production.sh

      - name: Pull admin image
        if: ${{ inputs.deploy_mode == 'images' }}
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/deploy-production.sh
          DEPLOY_PHASE=pull-admin ./scripts/deploy-production.sh

      - name: Pull web image
        if: ${{ inputs.deploy_mode == 'images' }}
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/deploy-production.sh
          DEPLOY_PHASE=pull-web ./scripts/deploy-production.sh

      - name: Build services
        if: ${{ inputs.deploy_mode != 'images' }}
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/deploy-production.sh
          DEPLOY_PHASE=pull-or-build ./scripts/deploy-production.sh

      - name: Run API migrations
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/deploy-production.sh
          DEPLOY_PHASE=migrate ./scripts/deploy-production.sh

      - name: Start staging services
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/deploy-production.sh
          DEPLOY_PHASE=up ./scripts/deploy-production.sh

      - name: Show service status
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/deploy-production.sh
          DEPLOY_PHASE=ps ./scripts/deploy-production.sh

      - name: Debug deploy context
        shell: bash
        run: |
          set -euo pipefail
          echo "== Runner context =="
          echo "hostname=$(hostname)"
          echo "whoami=$(whoami)"
          echo "pwd=$(pwd)"
          date -u +"utc=%Y-%m-%dT%H:%M:%SZ"
          for key in AWS_PROFILE AWS_DEFAULT_PROFILE AWS_REGION AWS_DEFAULT_REGION LOCAL_DEPLOY DEPLOY_HOST DEPLOY_USER DEPLOY_PATH REMOTE_ENV_FILE DEPLOY_MODE; do
            value="${!key-}"
            if [ -n "$value" ]; then
              echo "$key=$value"
            else
              echo "$key=<unset>"
            fi
          done
          if command -v aws >/dev/null 2>&1; then
            echo "aws_cli=present"
            aws --version || true
            aws sts get-caller-identity || true
          else
            echo "aws_cli=missing"
          fi
          echo "== Local container probes =="
          curl -sS -m 5 -o /tmp/api-health.json -w "api_3000_health_http=%{http_code}\n" http://127.0.0.1:3000/api/health || true
          head -c 200 /tmp/api-health.json || true
          echo
          curl -sS -m 5 -o /tmp/admin-3001-health.json -w "admin_3001_health_http=%{http_code}\n" http://127.0.0.1:3001 || true
          head -c 200 /tmp/admin-3001-health.json || true
          echo
          curl -sS -m 5 -o /tmp/public-api-health.json -w "public_api_health_http=%{http_code}\n" https://api.opensocial.so/api/health || true
          head -c 200 /tmp/public-api-health.json || true
          echo
          echo "== Container logs (tail 120) =="
          DEPLOY_PHASE=ps ./scripts/deploy-production.sh || true
          if [[ -d "${DEPLOY_PATH}" ]]; then
            (
              cd "${DEPLOY_PATH}"
              docker compose -f docker-compose.prod.yml --env-file "${REMOTE_ENV_FILE}" logs --tail=120 api || true
              docker compose -f docker-compose.prod.yml --env-file "${REMOTE_ENV_FILE}" logs --tail=120 nginx || true
            )
          else
            echo "deploy path not found on runner: ${DEPLOY_PATH}"
          fi

  verify-staging:
    if: ${{ inputs.run_post_deploy_verification }}
    needs: [deploy-staging]
    runs-on: [self-hosted, linux, x64, opensocial-prod]
    timeout-minutes: 45
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm (post-deploy verification)
        uses: pnpm/action-setup@v4
        with:
          version: 10.7.1

      - name: Setup Node (post-deploy verification)
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install deps (post-deploy verification)
        run: pnpm install --frozen-lockfile=false --prefer-offline

      - name: Debug verify context and route probes
        env:
          SMOKE_BASE_URL: https://api.opensocial.so
        run: |
          set -euo pipefail
          echo "== Verify runner context =="
          echo "hostname=$(hostname)"
          echo "whoami=$(whoami)"
          echo "pwd=$(pwd)"
          date -u +"utc=%Y-%m-%dT%H:%M:%SZ"
          for key in AWS_PROFILE AWS_DEFAULT_PROFILE AWS_REGION AWS_DEFAULT_REGION SMOKE_BASE_URL; do
            value="${!key-}"
            if [ -n "$value" ]; then
              echo "$key=$value"
            else
              echo "$key=<unset>"
            fi
          done
          if command -v aws >/dev/null 2>&1; then
            echo "aws_cli=present"
            aws --version || true
            aws sts get-caller-identity || true
          else
            echo "aws_cli=missing"
          fi
          echo "== DNS and route probes =="
          getent hosts api.opensocial.so || true
          curl -sS -m 8 -o /tmp/probe-health.json -w "probe_health_http=%{http_code}\n" "${SMOKE_BASE_URL}/api/health" || true
          head -c 200 /tmp/probe-health.json || true
          echo
          curl -sS -m 8 -o /tmp/probe-admin-health.json -w "probe_admin_health_http=%{http_code}\n" "${SMOKE_BASE_URL}/api/admin/health" || true
          head -c 200 /tmp/probe-admin-health.json || true
          echo
          curl -sS -m 8 -X POST -H "content-type: application/json" -d '{}' -o /tmp/probe-bootstrap.json -w "probe_smoke_exchange_http=%{http_code}\n" "${SMOKE_BASE_URL}/api/admin/ops/smoke-session/exchange" || true
          head -c 200 /tmp/probe-bootstrap.json || true
          echo

      - name: Wait for staging API health before bootstrap
        env:
          SMOKE_BASE_URL: https://api.opensocial.so
          DEPLOY_PATH: ${{ secrets.STAGING_DEPLOY_PATH }}
          REMOTE_ENV_FILE: .env.production
          LOCAL_DEPLOY: ${{ secrets.STAGING_LOCAL_DEPLOY || '0' }}
          DEPLOY_HOST: ${{ secrets.STAGING_DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.STAGING_DEPLOY_USER || 'ec2-user' }}
          STAGING_DEPLOY_SSH_KEY: ${{ secrets.STAGING_DEPLOY_SSH_KEY }}
        run: |
          set -euo pipefail
          max_attempts=24
          sleep_seconds=5
          echo "Waiting for ${SMOKE_BASE_URL}/api/health to return 200..."
          for attempt in $(seq 1 "$max_attempts"); do
            http_code="$(curl -sS -m 8 -o /tmp/wait-health.json -w "%{http_code}" "${SMOKE_BASE_URL}/api/health" || true)"
            if [[ "$http_code" == "200" ]]; then
              echo "API health is ready on attempt ${attempt}/${max_attempts}."
              exit 0
            fi
            preview="$(head -c 220 /tmp/wait-health.json 2>/dev/null || true)"
            echo "attempt ${attempt}/${max_attempts}: api health http=${http_code:-none} body=${preview:-<empty>}"
            sleep "$sleep_seconds"
          done

          echo "API did not become healthy in time; collecting deploy-path diagnostics."
          if [[ "${LOCAL_DEPLOY:-0}" == "1" ]]; then
            if [[ -d "${DEPLOY_PATH}" ]]; then
              (
                cd "${DEPLOY_PATH}"
                docker compose -f docker-compose.prod.yml --env-file "${REMOTE_ENV_FILE}" ps || true
                docker compose -f docker-compose.prod.yml --env-file "${REMOTE_ENV_FILE}" logs --tail=220 api || true
                docker compose -f docker-compose.prod.yml --env-file "${REMOTE_ENV_FILE}" logs --tail=120 nginx || true
              )
            else
              echo "deploy path not found on runner: ${DEPLOY_PATH}"
            fi
          else
            if [[ -n "${STAGING_DEPLOY_SSH_KEY:-}" ]]; then
              ssh_key_path="/tmp/staging_verify_key"
              printf "%s\n" "${STAGING_DEPLOY_SSH_KEY}" > "${ssh_key_path}"
              chmod 600 "${ssh_key_path}"
              ssh -i "${ssh_key_path}" -o BatchMode=yes -o StrictHostKeyChecking=accept-new "${DEPLOY_USER}@${DEPLOY_HOST}" \
                "set -euo pipefail; cd '${DEPLOY_PATH}'; docker compose -f docker-compose.prod.yml --env-file '${REMOTE_ENV_FILE}' ps || true; docker compose -f docker-compose.prod.yml --env-file '${REMOTE_ENV_FILE}' logs --tail=220 api || true; docker compose -f docker-compose.prod.yml --env-file '${REMOTE_ENV_FILE}' logs --tail=120 nginx || true" \
                || true
            else
              echo "STAGING_DEPLOY_SSH_KEY unavailable; skipping remote diagnostics."
            fi
          fi
          exit 1

      - name: Bootstrap smoke session token
        env:
          SMOKE_BASE_URL: https://api.opensocial.so
          SMOKE_HOST_HEADER: ${{ secrets.STAGING_SMOKE_HOST_HEADER }}
          SMOKE_APPLICATION_KEY: ${{ secrets.STAGING_SMOKE_SESSION_APPLICATION_KEY || secrets.SMOKE_SESSION_APPLICATION_KEY }}
          SMOKE_APPLICATION_TOKEN: ${{ secrets.STAGING_SMOKE_SESSION_APPLICATION_TOKEN || secrets.SMOKE_SESSION_APPLICATION_TOKEN }}
          SMOKE_ADMIN_USER_ID: ${{ secrets.STAGING_SMOKE_ADMIN_USER_ID || secrets.SMOKE_ADMIN_USER_ID }}
          SMOKE_ADMIN_ROLE: ${{ secrets.STAGING_SMOKE_ADMIN_ROLE || secrets.SMOKE_ADMIN_ROLE || 'admin' }}
          SMOKE_ADMIN_API_KEY: ${{ secrets.STAGING_SMOKE_ADMIN_API_KEY || secrets.SMOKE_ADMIN_API_KEY }}
          SMOKE_BOOTSTRAP_REQUIRED: "1"
        run: |
          set -euo pipefail
          node scripts/bootstrap-smoke-session.mjs

      - name: Refresh smoke session token
        env:
          SMOKE_BASE_URL: https://api.opensocial.so
          SMOKE_HOST_HEADER: ${{ secrets.STAGING_SMOKE_HOST_HEADER }}
          SMOKE_REFRESH_REQUIRED: "0"
        run: |
          set -euo pipefail
          node scripts/refresh-smoke-session.mjs

      - name: Verify incident-readiness gates
        env:
          SMOKE_BASE_URL: https://api.opensocial.so
          SMOKE_HOST_HEADER: ${{ secrets.STAGING_SMOKE_HOST_HEADER }}
          SMOKE_ADMIN_USER_ID: ${{ secrets.STAGING_SMOKE_ADMIN_USER_ID || secrets.SMOKE_ADMIN_USER_ID }}
          SMOKE_ADMIN_ROLE: ${{ secrets.STAGING_SMOKE_ADMIN_ROLE || secrets.SMOKE_ADMIN_ROLE || 'support' }}
          SMOKE_ADMIN_API_KEY: ${{ secrets.STAGING_SMOKE_ADMIN_API_KEY || secrets.SMOKE_ADMIN_API_KEY }}
          SMOKE_TIMEOUT_MS: "15000"
          INCIDENT_VERIFY_REQUIRE_HEALTHY: "true"
          INCIDENT_VERIFY_FAIL_ON_WARNING: "false"
          INCIDENT_VERIFY_RUNBOOKS: "true"
        run: |
          set -euo pipefail
          pnpm staging:verify:incident

      - name: Verify backend golden suite lane
        timeout-minutes: 30
        env:
          STAGING_EQUALS_PROD: "true"
          BACKEND_OPS_TARGET: "staging"
          BACKEND_OPS_INCLUDE_MODERATION_DRILL: "0"
          SMOKE_BASE_URL: https://api.opensocial.so
          SMOKE_HOST_HEADER: ${{ secrets.STAGING_SMOKE_HOST_HEADER }}
          SMOKE_ADMIN_USER_ID: ${{ secrets.STAGING_SMOKE_ADMIN_USER_ID || secrets.SMOKE_ADMIN_USER_ID }}
          SMOKE_ADMIN_ROLE: ${{ secrets.STAGING_SMOKE_ADMIN_ROLE || secrets.SMOKE_ADMIN_ROLE || 'admin' }}
          SMOKE_ADMIN_API_KEY: ${{ secrets.STAGING_SMOKE_ADMIN_API_KEY || secrets.SMOKE_ADMIN_API_KEY }}
          SMOKE_APPLICATION_KEY: ${{ secrets.STAGING_SMOKE_SESSION_APPLICATION_KEY || secrets.SMOKE_SESSION_APPLICATION_KEY }}
          SMOKE_APPLICATION_TOKEN: ${{ secrets.STAGING_SMOKE_SESSION_APPLICATION_TOKEN || secrets.SMOKE_SESSION_APPLICATION_TOKEN }}
          AGENTIC_VERIFICATION_LANE_ID: ${{ env.AGENTIC_VERIFICATION_LANE_ID || secrets.STAGING_AGENTIC_VERIFICATION_LANE_ID || secrets.AGENTIC_VERIFICATION_LANE_ID || secrets.PROD_AGENTIC_VERIFICATION_LANE_ID }}
          ONBOARDING_PROBE_TOKEN: ${{ env.ONBOARDING_PROBE_TOKEN || secrets.STAGING_ONBOARDING_PROBE_TOKEN || secrets.ONBOARDING_PROBE_TOKEN || secrets.PROD_ONBOARDING_PROBE_TOKEN }}
          PLAYGROUND_BASE_URL: https://api.opensocial.so
          PLAYGROUND_HOST_HEADER: ${{ secrets.STAGING_SMOKE_HOST_HEADER }}
          AGENTIC_BENCH_URL: ${{ env.AGENTIC_BENCH_URL || 'https://api.opensocial.so' }}
          AGENTIC_BENCH_HOST_HEADER: ${{ secrets.STAGING_SMOKE_HOST_HEADER }}
          AGENTIC_BENCH_USE_UNIQUE_IP: "false"
          AGENTIC_BENCH_RUNS: "1"
          AGENTIC_BENCH_DELAY_MS: "2000"
          AGENTIC_BENCH_POLL_MS: "5000"
          AGENTIC_BENCH_BACKGROUND_WAIT_MS: "20000"
          AGENTIC_BENCH_REQUEST_TIMEOUT_MS: "15000"
          AGENTIC_BENCH_REQUEST_RETRY_COUNT: "2"
          AGENTIC_BENCH_REQUEST_RETRY_DELAY_MS: "500"
          SMOKE_ALLOW_OPENAI_CIRCUIT_OPEN: "true"
          AGENT_TEST_SUITE_RERUN_FAILED_ONLY: "0"
          AGENT_TEST_SUITE_RETRY_FAILED_STAGES_ONCE: "1"
          AGENT_TEST_SUITE_VERIFICATION_ARTIFACT_PATH: /tmp/openchat-agent-suite-verification-latest.json
          PLAYGROUND_ADMIN_USER_ID: ${{ secrets.STAGING_SMOKE_ADMIN_USER_ID || secrets.SMOKE_ADMIN_USER_ID }}
          PLAYGROUND_ADMIN_ROLE: ${{ secrets.STAGING_SMOKE_ADMIN_ROLE || secrets.SMOKE_ADMIN_ROLE || 'admin' }}
          PLAYGROUND_ADMIN_API_KEY: ${{ secrets.STAGING_SMOKE_ADMIN_API_KEY || secrets.SMOKE_ADMIN_API_KEY }}
          PLAYGROUND_BOOTSTRAP_REQUIRED: "0"
        run: |
          set -euo pipefail
          timeout 28m pnpm test:backend:ops-pack || status=$?
          if [[ -f /tmp/openchat-agent-suite-verification-latest.json ]]; then
            echo "== verification summary artifact =="
            cat /tmp/openchat-agent-suite-verification-latest.json || true
          else
            echo "verification summary artifact missing at /tmp/openchat-agent-suite-verification-latest.json"
          fi
          if [[ "${status:-0}" -ne 0 ]]; then
            exit "$status"
          fi

name: Staging Mobile E2E Session

on:
  workflow_dispatch:
    inputs:
      smoke_user_id:
        description: "Optional target user id for the emitted mobile session"
        required: false
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  staging-mobile-e2e-session:
    name: Emit Staging Mobile E2E Session
    runs-on: [self-hosted, linux, x64, opensocial-prod]
    environment: staging
    timeout-minutes: 20
    env:
      ARTIFACT_ROOT: .artifacts/staging-mobile-e2e-session/${{ github.run_id }}
      SMOKE_BASE_URL: https://api.opensocial.so
      SMOKE_HOST_HEADER: ${{ secrets.STAGING_SMOKE_HOST_HEADER }}
      SMOKE_ADMIN_USER_ID: ${{ secrets.STAGING_SMOKE_ADMIN_USER_ID || secrets.SMOKE_ADMIN_USER_ID }}
      SMOKE_ADMIN_ROLE: ${{ secrets.STAGING_SMOKE_ADMIN_ROLE || secrets.SMOKE_ADMIN_ROLE || 'admin' }}
      SMOKE_ADMIN_API_KEY: ${{ secrets.STAGING_SMOKE_ADMIN_API_KEY || secrets.SMOKE_ADMIN_API_KEY }}
      SMOKE_APPLICATION_KEY: ${{ secrets.STAGING_SMOKE_SESSION_APPLICATION_KEY || secrets.SMOKE_SESSION_APPLICATION_KEY }}
      SMOKE_APPLICATION_TOKEN: ${{ secrets.STAGING_SMOKE_SESSION_APPLICATION_TOKEN || secrets.SMOKE_SESSION_APPLICATION_TOKEN }}
      SMOKE_BOOTSTRAP_REQUIRED: "1"
      SMOKE_TARGET_USER_ID: ${{ inputs.smoke_user_id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Bootstrap smoke session token
        shell: bash
        run: |
          set -euo pipefail
          node scripts/bootstrap-smoke-session.mjs
          node scripts/refresh-smoke-session.mjs

      - name: Emit mobile e2e session artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${ARTIFACT_ROOT}"
          node scripts/emit-mobile-e2e-session.mjs | tee "${ARTIFACT_ROOT}/mobile-e2e-session.json"

      - name: Publish mobile e2e session artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-mobile-e2e-session-${{ github.run_id }}
          path: .artifacts/staging-mobile-e2e-session/${{ github.run_id }}
          if-no-files-found: warn

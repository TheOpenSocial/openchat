name: System Evaluation Matrix

on:
  workflow_dispatch:
    inputs:
      enable_live_social_sim:
        description: "Include provider-backed social simulation in the live system gate"
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "0 12 * * *"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  system-live-evals:
    name: Live Staging System Matrix
    runs-on: [self-hosted, linux, x64, opensocial-prod]
    environment: staging
    timeout-minutes: 90
    concurrency:
      group: system-live-evals-staging
      cancel-in-progress: false
    env:
      EVAL_ARTIFACT_ROOT: .artifacts/system-live-evals/${{ github.run_id }}
      STAGING_API_BASE_URL: ${{ secrets.STAGING_API_BASE_URL }}
      STAGING_SMOKE_ADMIN_USER_ID: ${{ secrets.STAGING_SMOKE_ADMIN_USER_ID || secrets.SMOKE_ADMIN_USER_ID }}
      STAGING_SMOKE_ADMIN_ROLE: ${{ secrets.STAGING_SMOKE_ADMIN_ROLE || secrets.SMOKE_ADMIN_ROLE || 'admin' }}
      STAGING_SMOKE_ADMIN_API_KEY: ${{ secrets.STAGING_SMOKE_ADMIN_API_KEY || secrets.SMOKE_ADMIN_API_KEY }}
      SOCIAL_SIM_BASE_URL: ${{ secrets.STAGING_API_BASE_URL }}
      SOCIAL_SIM_ADMIN_USER_ID: ${{ secrets.STAGING_SMOKE_ADMIN_USER_ID || secrets.SMOKE_ADMIN_USER_ID }}
      SOCIAL_SIM_ADMIN_ROLE: ${{ secrets.STAGING_SMOKE_ADMIN_ROLE || secrets.SMOKE_ADMIN_ROLE || 'admin' }}
      SOCIAL_SIM_ADMIN_API_KEY: ${{ secrets.STAGING_SMOKE_ADMIN_API_KEY || secrets.SMOKE_ADMIN_API_KEY }}
      OLLAMA_BASE_URL: ${{ secrets.OLLAMA_BASE_URL }}
      OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
      SOCIAL_SIM_OLLAMA_MODEL: ${{ secrets.SOCIAL_SIM_OLLAMA_MODEL || vars.SOCIAL_SIM_OLLAMA_MODEL || 'deepseek-v3.1:671b' }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      EVAL_SYSTEM_LIVE_SOCIAL_SIM_PROVIDER: ollama
      EVAL_SYSTEM_LIVE_SOCIAL_SIM_JUDGE_PROVIDER: stub
      EVAL_SYSTEM_LIVE_SOCIAL_SIM_USE_REMOTE_JUDGE: "0"
      SOCIAL_SIM_BENCHMARK_CONCURRENCY: "3"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Validate Staging Evaluation Credentials
        shell: bash
        run: |
          set -euo pipefail
          missing=0
          for key in STAGING_API_BASE_URL STAGING_SMOKE_ADMIN_USER_ID STAGING_SMOKE_ADMIN_API_KEY; do
            if [[ -z "${!key:-}" ]]; then
              echo "Missing required env: ${key}" >&2
              missing=1
            fi
          done
          if [[ "${missing}" -ne 0 ]]; then
            exit 1
          fi

      - name: Execute Live System Evaluation Matrix
        timeout-minutes: 80
        shell: bash
        run: |
          set -euo pipefail
          cmd=(pnpm eval:system:live:workflows)
          if [[ "${{ github.event_name == 'workflow_dispatch' && inputs.enable_live_social_sim || false }}" == "true" ]]; then
            cmd+=(--live-social-sim=1)
          fi
          "${cmd[@]}"

      - name: Compare Against Accepted System Baseline
        shell: bash
        run: |
          set -euo pipefail
          node scripts/evals/system/compare-system-baseline.mjs \
            --artifact-root="${EVAL_ARTIFACT_ROOT}" \
            --fail-on-regression=1

      - name: Publish System Evaluation Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: system-live-evals-${{ github.run_id }}
          path: .artifacts/system-live-evals/${{ github.run_id }}
          if-no-files-found: warn

name: System Evaluation Matrix

on:
  workflow_dispatch:
    inputs:
      enable_live_social_sim:
        description: "Include provider-backed social simulation in the live system gate"
        required: false
        default: true
        type: boolean
  schedule:
    - cron: "0 12 * * *"

jobs:
  system-live-evals:
    name: Live Staging System Matrix
    runs-on: [self-hosted, linux, x64, opensocial-prod]
    environment: staging
    timeout-minutes: 90
    concurrency:
      group: system-live-evals-staging
      cancel-in-progress: false
    env:
      EVAL_ARTIFACT_ROOT: .artifacts/system-live-evals/${{ github.run_id }}
      STAGING_API_BASE_URL: ${{ secrets.STAGING_API_BASE_URL }}
      STAGING_SMOKE_ADMIN_USER_ID: ${{ secrets.STAGING_SMOKE_ADMIN_USER_ID || secrets.SMOKE_ADMIN_USER_ID }}
      STAGING_SMOKE_ADMIN_ROLE: ${{ secrets.STAGING_SMOKE_ADMIN_ROLE || secrets.SMOKE_ADMIN_ROLE || 'admin' }}
      STAGING_SMOKE_ADMIN_API_KEY: ${{ secrets.STAGING_SMOKE_ADMIN_API_KEY || secrets.SMOKE_ADMIN_API_KEY }}
      SOCIAL_SIM_BASE_URL: ${{ secrets.STAGING_API_BASE_URL }}
      SOCIAL_SIM_ADMIN_USER_ID: ${{ secrets.STAGING_SMOKE_ADMIN_USER_ID || secrets.SMOKE_ADMIN_USER_ID }}
      SOCIAL_SIM_ADMIN_ROLE: ${{ secrets.STAGING_SMOKE_ADMIN_ROLE || secrets.SMOKE_ADMIN_ROLE || 'admin' }}
      SOCIAL_SIM_ADMIN_API_KEY: ${{ secrets.STAGING_SMOKE_ADMIN_API_KEY || secrets.SMOKE_ADMIN_API_KEY }}
      OLLAMA_BASE_URL: ${{ secrets.OLLAMA_BASE_URL }}
      OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
      SOCIAL_SIM_OLLAMA_MODEL: ${{ secrets.SOCIAL_SIM_OLLAMA_MODEL || vars.SOCIAL_SIM_OLLAMA_MODEL || 'deepseek-v3.1:671b' }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      EVAL_SYSTEM_LIVE_SOCIAL_SIM_PROVIDER: ollama
      EVAL_SYSTEM_LIVE_SOCIAL_SIM_JUDGE_PROVIDER: stub
      EVAL_SYSTEM_LIVE_SOCIAL_SIM_USE_REMOTE_JUDGE: "0"
      EVAL_REPLAY_EXPORT_LIMIT: "25"
      SOCIAL_SIM_BENCHMARK_CONCURRENCY: "3"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Validate Staging Evaluation Credentials
        shell: bash
        run: |
          set -euo pipefail
          missing=0
          for key in STAGING_API_BASE_URL STAGING_SMOKE_ADMIN_USER_ID STAGING_SMOKE_ADMIN_API_KEY; do
            if [[ -z "${!key:-}" ]]; then
              echo "Missing required env: ${key}" >&2
              missing=1
            fi
          done
          if [[ "${missing}" -ne 0 ]]; then
            exit 1
          fi

      - name: Ensure Ollama endpoint is ready
        shell: bash
        run: |
          set -euo pipefail
          enable_live_social_sim="${{ github.event_name == 'schedule' && 'true' || inputs.enable_live_social_sim }}"

          if [[ "${enable_live_social_sim}" != "true" ]]; then
            exit 0
          fi

          if [[ -z "${OLLAMA_BASE_URL:-}" ]]; then
            echo "OLLAMA_BASE_URL is required when live social simulation is enabled." >&2
            exit 1
          fi

          probe_url="${OLLAMA_BASE_URL%/}/api/tags"
          probe_attempts=10
          probe_sleep=2
          ollama_log="/tmp/system-live-evals-ollama.log"
          local_host="$(node -e 'const url = new URL(process.argv[1]); process.stdout.write(url.hostname);' "${OLLAMA_BASE_URL}")"
          ollama_bin="$(command -v ollama || true)"
          started_ollama=0

          probe_tags() {
            if [[ -n "${OLLAMA_API_KEY:-}" ]]; then
              curl -fsS --max-time 5 -H "Authorization: Bearer ${OLLAMA_API_KEY}" "${probe_url}"
            else
              curl -fsS --max-time 5 "${probe_url}"
            fi
          }

          for _ in $(seq 1 "${probe_attempts}"); do
            if tags_json="$(probe_tags)"; then
              break
            fi
            sleep "${probe_sleep}"
          done

          if [[ -z "${tags_json:-}" ]]; then
            if [[ "${local_host}" == "127.0.0.1" || "${local_host}" == "localhost" ]]; then
              if [[ -n "${ollama_bin}" ]]; then
                nohup "${ollama_bin}" serve >"${ollama_log}" 2>&1 &
                started_ollama=1
              elif command -v sudo >/dev/null 2>&1 && sudo -n systemctl start ollama >/dev/null 2>&1; then
                started_ollama=1
              elif command -v systemctl >/dev/null 2>&1 && systemctl --user start ollama >/dev/null 2>&1; then
                started_ollama=1
              fi

              for _ in $(seq 1 15); do
                if tags_json="$(probe_tags)"; then
                  break
                fi
                sleep 2
              done
            fi
          fi

          if [[ -z "${tags_json:-}" ]]; then
            echo "Ollama endpoint is not reachable at ${OLLAMA_BASE_URL}." >&2
            echo "Resolved host: ${local_host}" >&2
            echo "ollama binary: ${ollama_bin:-not-found}" >&2
            if [[ -f "${ollama_log}" ]]; then
              echo "--- ollama serve log ---" >&2
              tail -n 40 "${ollama_log}" >&2 || true
            fi
            exit 1
          fi

          TAGS_JSON="${tags_json}" node <<'EOF'
          const tags = JSON.parse(process.env.TAGS_JSON ?? "{}");
          const wanted = process.env.SOCIAL_SIM_OLLAMA_MODEL;
          const available = new Set((tags.models ?? []).map((model) => model.name));
          if (!available.has(wanted)) {
            console.error(`Configured SOCIAL_SIM_OLLAMA_MODEL "${wanted}" is not available on the Ollama endpoint.`);
            console.error(`Available models: ${[...available].sort().join(", ") || "(none)"}`);
            process.exit(1);
          }
          EOF

      - name: Execute Live System Evaluation Matrix
        timeout-minutes: 80
        shell: bash
        run: |
          set -euo pipefail
          cmd=(pnpm eval:system:live:workflows)
          if [[ "${{ github.event_name == 'schedule' && 'true' || inputs.enable_live_social_sim }}" == "true" ]]; then
            cmd+=(--live-social-sim=1)
          fi
          "${cmd[@]}"

      - name: Compare Against Accepted System Baseline
        shell: bash
        run: |
          set -euo pipefail
          node scripts/evals/system/compare-system-baseline.mjs \
            --artifact-root="${EVAL_ARTIFACT_ROOT}" \
            --fail-on-regression=1

      - name: Publish System Evaluation Artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: system-live-evals-${{ github.run_id }}
          path: .artifacts/system-live-evals/${{ github.run_id }}
          if-no-files-found: warn

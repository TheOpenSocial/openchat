name: Rollback Production

on:
  workflow_dispatch:
    inputs:
      deploy_mode:
        description: "Rollback from git ref or prebuilt images"
        required: true
        default: build
        type: choice
        options:
          - build
          - images
      rollback_ref:
        description: "Git ref to rollback to when using build mode"
        required: false
        type: string
      api_image:
        description: "Prebuilt API image reference when using images mode"
        required: false
        type: string
      admin_image:
        description: "Prebuilt admin image reference when using images mode"
        required: false
        type: string
      web_image:
        description: "Prebuilt web image reference when using images mode"
        required: false
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  rollback-production:
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Prepare SSH key
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          echo "${PRODUCTION_SSH_KEY}" > ~/.ssh/production_key
          chmod 600 ~/.ssh/production_key
        env:
          PRODUCTION_SSH_KEY: ${{ secrets.PRODUCTION_SSH_KEY }}

      - name: Rollback production
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.PRODUCTION_HOST }}
          DEPLOY_USER: ${{ secrets.PRODUCTION_USER }}
          DEPLOY_PATH: ${{ secrets.PRODUCTION_DEPLOY_PATH }}
          SSH_KEY_PATH: ~/.ssh/production_key
          DEPLOY_MODE: ${{ inputs.deploy_mode }}
          ROLLBACK_REF: ${{ inputs.rollback_ref }}
          API_IMAGE: ${{ inputs.api_image }}
          ADMIN_IMAGE: ${{ inputs.admin_image }}
          WEB_IMAGE: ${{ inputs.web_image }}
          REGISTRY_HOST: ghcr.io
          REGISTRY_USERNAME: ${{ secrets.GHCR_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.GHCR_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ONBOARDING_LLM_MODEL: ${{ secrets.ONBOARDING_LLM_MODEL }}
          ONBOARDING_LLM_FAST_MODEL: ${{ secrets.ONBOARDING_LLM_FAST_MODEL }}
          ONBOARDING_LLM_RICH_MODEL: ${{ secrets.ONBOARDING_LLM_RICH_MODEL }}
          ONBOARDING_LLM_TIMEOUT_MS: ${{ secrets.ONBOARDING_LLM_TIMEOUT_MS }}
          ONBOARDING_LLM_RICH_TIMEOUT_MS: ${{ secrets.ONBOARDING_LLM_RICH_TIMEOUT_MS }}
          ONBOARDING_PROBE_TOKEN: ${{ secrets.ONBOARDING_PROBE_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REDIRECT_URI: https://api.opensocial.so/api/auth/google/callback
        run: |
          set -euo pipefail
          chmod +x scripts/deploy-rollback.sh
          ./scripts/deploy-rollback.sh

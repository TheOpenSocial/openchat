name: Staging Find User

on:
  workflow_dispatch:
    inputs:
      query:
        description: "Email, display name, username, or UUID fragment"
        required: true
        default: jefferson
        type: string
      limit:
        description: "Max rows"
        required: false
        default: "10"
        type: string

jobs:
  staging-find-user:
    runs-on: ubuntu-latest
    environment: staging
    env:
      DEPLOY_HOST: ${{ secrets.STAGING_DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.STAGING_DEPLOY_USER || 'ec2-user' }}
      SSH_KEY_PATH: /tmp/staging_deploy_key
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.7.1

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false

      - name: Prepare deploy SSH key
        shell: bash
        env:
          STAGING_DEPLOY_SSH_KEY: ${{ secrets.STAGING_DEPLOY_SSH_KEY }}
        run: |
          set -euo pipefail
          if [[ -z "${STAGING_DEPLOY_SSH_KEY:-}" ]]; then
            echo "STAGING_DEPLOY_SSH_KEY secret is required." >&2
            exit 1
          fi
          printf "%s\n" "$STAGING_DEPLOY_SSH_KEY" > "$SSH_KEY_PATH"
          chmod 600 "$SSH_KEY_PATH"

      - name: Install root dependencies
        run: pnpm install --frozen-lockfile

      - name: Hydrate DATABASE_URL from staging deploy env
        if: ${{ env.DATABASE_URL == '' }}
        shell: bash
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL || secrets.DATABASE_URL }}
        run: |
          set -euo pipefail
          db_line_remote="$(
            ssh -i "$SSH_KEY_PATH" -o BatchMode=yes -o StrictHostKeyChecking=accept-new "${DEPLOY_USER}@${DEPLOY_HOST}" \
              "set -euo pipefail; f='/opt/opensocial/.env.production'; if [[ -f \"\$f\" ]]; then grep -m1 '^DATABASE_URL=' \"\$f\" || true; fi" \
            || true
          )"
          if [[ -n "$db_line_remote" ]]; then
            echo "DATABASE_URL=${db_line_remote#DATABASE_URL=}" >> "$GITHUB_ENV"
            exit 0
          fi
          echo "DATABASE_URL could not be hydrated from staging deploy env." >&2
          exit 1

      - name: Query staging users
        env:
          USER_QUERY: ${{ inputs.query }}
          USER_LIMIT: ${{ inputs.limit }}
        run: |
          set -euo pipefail
          node <<'NODE' | tee staging-user-query.json
          const { Client } = require("pg");

          async function main() {
            const client = new Client({ connectionString: process.env.DATABASE_URL });
            const query = String(process.env.USER_QUERY || "").trim();
            const limit = Math.max(1, Math.min(Number(process.env.USER_LIMIT || "10"), 50));
            if (!query) throw new Error("USER_QUERY is required");
            await client.connect();
            const sql = `
              select
                id,
                email,
                display_name as "displayName",
                username,
                created_at as "createdAt",
                updated_at as "updatedAt"
              from users
              where
                cast(id as text) ilike $1
                or coalesce(email, '') ilike $1
                or display_name ilike $1
                or coalesce(username, '') ilike $1
              order by updated_at desc
              limit $2
            `;
            const result = await client.query(sql, [ `%${query}%`, limit ]);
            console.log(JSON.stringify({ query, count: result.rows.length, rows: result.rows }, null, 2));
            await client.end();
          }

          main().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE

      - name: Upload user query output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-user-query
          path: staging-user-query.json

name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      deploy_mode:
        description: "Deploy from local build or prebuilt images"
        required: true
        default: build
        type: choice
        options:
          - build
          - images
      api_image:
        description: "Optional prebuilt API image reference"
        required: false
        type: string
      admin_image:
        description: "Optional prebuilt admin image reference"
        required: false
        type: string
      web_image:
        description: "Optional prebuilt web image reference"
        required: false
        type: string
      docs_image:
        description: "Optional prebuilt docs image reference"
        required: false
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy-production:
    runs-on: [self-hosted, linux, x64, opensocial-prod]
    environment: production
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    env:
      LOCAL_DEPLOY: "1"
      DEPLOY_PATH: /opt/opensocial
      REMOTE_ENV_FILE: .env.production
      DEPLOY_MODE: ${{ inputs.deploy_mode }}
      API_IMAGE: ${{ inputs.api_image }}
      ADMIN_IMAGE: ${{ inputs.admin_image }}
      WEB_IMAGE: ${{ inputs.web_image }}
      DOCS_IMAGE: ${{ inputs.docs_image }}
      REGISTRY_HOST: ghcr.io
      REGISTRY_USERNAME: ${{ secrets.GHCR_USERNAME }}
      REGISTRY_PASSWORD: ${{ secrets.GHCR_TOKEN }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ONBOARDING_LLM_MODEL: ${{ secrets.ONBOARDING_LLM_MODEL }}
      ONBOARDING_LLM_FAST_MODEL: ${{ secrets.ONBOARDING_LLM_FAST_MODEL }}
      ONBOARDING_LLM_RICH_MODEL: ${{ secrets.ONBOARDING_LLM_RICH_MODEL }}
      ONBOARDING_LLM_FAST_MODEL_CANDIDATES: ${{ secrets.ONBOARDING_LLM_FAST_MODEL_CANDIDATES }}
      ONBOARDING_LLM_RICH_MODEL_CANDIDATES: ${{ secrets.ONBOARDING_LLM_RICH_MODEL_CANDIDATES }}
      ONBOARDING_LLM_TIMEOUT_MS: ${{ secrets.ONBOARDING_LLM_TIMEOUT_MS }}
      ONBOARDING_LLM_RICH_TIMEOUT_MS: ${{ secrets.ONBOARDING_LLM_RICH_TIMEOUT_MS }}
      ONBOARDING_PROBE_TOKEN: ${{ secrets.ONBOARDING_PROBE_TOKEN }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      GOOGLE_REDIRECT_URI: https://api.opensocial.so/api/auth/google/callback
      AWS_REGION: ${{ secrets.AWS_REGION }}
      S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
      S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
      S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
      S3_BUCKET: ${{ secrets.S3_BUCKET }}
      MEDIA_CDN_BASE_URL: ${{ secrets.MEDIA_CDN_BASE_URL }}
      S3_PRESIGNED_UPLOADS_ENABLED: ${{ secrets.S3_PRESIGNED_UPLOADS_ENABLED }}
      MEDIA_SIGNING_SECRET: ${{ secrets.MEDIA_SIGNING_SECRET }}
      MEDIA_UPLOAD_SIGNING_SECRET: ${{ secrets.MEDIA_UPLOAD_SIGNING_SECRET }}
      ADMIN_API_KEY: ${{ secrets.SMOKE_ADMIN_API_KEY }}
      PLAYGROUND_ENABLED: "true"
      PLAYGROUND_MUTATIONS_ENABLED: "true"
      PLAYGROUND_ALLOWED_ADMIN_USER_IDS: ${{ secrets.SMOKE_ADMIN_USER_ID }}
      SOCIAL_SIM_ENABLED: "true"
      SOCIAL_SIM_MUTATIONS_ENABLED: "true"
      SOCIAL_SIM_ALLOWED_ADMIN_USER_IDS: ${{ secrets.SMOKE_ADMIN_USER_ID }}
      SMOKE_SESSION_APPLICATION_ENABLED: "true"
      SMOKE_SESSION_APPLICATION_KEY: ${{ secrets.SMOKE_SESSION_APPLICATION_KEY }}
      SMOKE_SESSION_APPLICATION_TOKEN: ${{ secrets.SMOKE_SESSION_APPLICATION_TOKEN }}
      REQUEST_SECURITY_VERIFICATION_BYPASS_ENABLED: "true"
      AGENTIC_VERIFICATION_LANE_ID: ${{ secrets.AGENTIC_VERIFICATION_LANE_ID || 'verification-lane-77777777' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Sync deploy workspace
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/deploy-production.sh
          DEPLOY_PHASE=sync ./scripts/deploy-production.sh

      - name: Registry login
        if: ${{ inputs.deploy_mode == 'images' }}
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/deploy-production.sh
          DEPLOY_PHASE=registry-login ./scripts/deploy-production.sh

      - name: Pull API image
        if: ${{ inputs.deploy_mode == 'images' }}
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/deploy-production.sh
          DEPLOY_PHASE=pull-api ./scripts/deploy-production.sh

      - name: Pull admin image
        if: ${{ inputs.deploy_mode == 'images' }}
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/deploy-production.sh
          DEPLOY_PHASE=pull-admin ./scripts/deploy-production.sh

      - name: Pull web image
        if: ${{ inputs.deploy_mode == 'images' }}
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/deploy-production.sh
          DEPLOY_PHASE=pull-web ./scripts/deploy-production.sh

      - name: Pull docs image
        if: ${{ inputs.deploy_mode == 'images' }}
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/deploy-production.sh
          DEPLOY_PHASE=pull-docs ./scripts/deploy-production.sh

      - name: Build services
        if: ${{ inputs.deploy_mode != 'images' }}
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/deploy-production.sh
          DEPLOY_PHASE=pull-or-build ./scripts/deploy-production.sh

      - name: Run API migrations
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/deploy-production.sh
          DEPLOY_PHASE=migrate ./scripts/deploy-production.sh

      - name: Start production services
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/deploy-production.sh
          DEPLOY_PHASE=up ./scripts/deploy-production.sh

      - name: Verify production health
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/deploy-production.sh
          DEPLOY_PHASE=health ./scripts/deploy-production.sh

      - name: Show service logs on failure
        if: ${{ failure() }}
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/deploy-production.sh
          DEPLOY_PHASE=logs ./scripts/deploy-production.sh

      - name: Show service status
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/deploy-production.sh
          DEPLOY_PHASE=ps ./scripts/deploy-production.sh

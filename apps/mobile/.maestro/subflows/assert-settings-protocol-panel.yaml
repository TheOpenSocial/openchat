      id: "settings-protocol-panel"
    timeout: 15000
- assertVisible:
    id: "settings-protocol-panel"
- scrollUntilVisible:
    element:
      id: "settings-protocol-linked-apps"
    direction: DOWN
    timeout: 15000
- assertVisible:
    id: "settings-protocol-linked-apps"
- assertVisible:
    text: "Linked protocol apps"
- scrollUntilVisible:
    element:
      id: "settings-protocol-access-summary"
    direction: DOWN
    timeout: 15000

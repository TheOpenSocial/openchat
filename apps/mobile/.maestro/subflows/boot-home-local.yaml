appId: ${MAESTRO_APP_ID}
---
- launchApp:
    clearState: true
    permissions:
      all: unset
- openLink: ${MAESTRO_EXPO_URL}
- runFlow: accept-open-expo-go.yaml
- tapOn:
    text: "Open"
    optional: true
- tapOn:
    text: "Continue"
    optional: true
- tapOn:
    text: "Skip"
    optional: true
- tapOn:
    text: "Try it now"
    optional: true
- tapOn:
    text: "Reload"
    optional: true
- tapOn:
    text: "Continue"
    optional: true
- tapOn:
    text: "Skip"
    optional: true
- tapOn:
    text: "Try it now"
    optional: true
- runFlow: accept-open-expo-go.yaml
- tapOn:
    text: "Open"
    optional: true
- waitForAnimationToEnd
- runFlow:
    when:
      visible:
        id: "auth-screen"
    commands:
      - tapOn:
          id: "auth-e2e-bypass-button"
- runFlow:
    when:
      visible:
        id: "onboarding-screen"
    commands:
      - tapOn:
          id: "onboarding-s1-continue"
      - tapOn:
          id: "onboarding-goal-meet-people"
      - tapOn:
          id: "onboarding-s2-continue"
      - tapOn:
          id: "onboarding-s3-continue"
      - tapOn:
          id: "onboarding-s4-continue"
      - tapOn:
          id: "onboarding-display-name"
      - eraseText
      - inputText: "Maestro User"
      - tapOn:
          id: "onboarding-bio-input"
      - inputText: "Surface smoke validation."
      - tapOn:
          id: "onboarding-area-input"
      - inputText: "Buenos Aires"
      - tapOn:
          id: "onboarding-country-input"
      - inputText: "Argentina"
      - tapOn:
          id: "onboarding-s5-continue"
      - tapOn:
          id: "onboarding-s6-skip"
- runFlow:
    when:
      visible:
        text: "Continue"
    commands:
      - tapOn:
          text: "Continue"
- runFlow:
    when:
      visible:
        text: "Reload"
    commands:
      - tapOn:
          text: "Reload"
- extendedWaitUntil:
    visible:
      id: "home-screen"
    timeout: 30000
- assertVisible:
    id: "home-screen"
- runFlow:
    when:
      visible:
        id: "home-welcome-close"
    commands:
      - tapOn:
          id: "home-welcome-close"
- tapOn:
    point: "91%,45%"
    optional: true

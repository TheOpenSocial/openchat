appId: ${MAESTRO_APP_ID}
---
- launchApp
- openLink: ${MAESTRO_EXPO_URL}
- runFlow:
    when:
      visible:
        text: "Open"
    commands:
      - tapOn:
          text: "Open"
- runFlow:
    when:
      visible:
        text: "Continue"
    commands:
      - tapOn:
          text: "Continue"
- runFlow:
    when:
      visible:
        text: "Minimize"
    commands:
      - tapOn:
          text: "Minimize"
- runFlow:
    when:
      visible:
        text: "Dismiss"
    commands:
      - tapOn:
          text: "Dismiss"
- runFlow:
    when:
      visible:
        text: "Skip"
    commands:
      - tapOn:
          text: "Skip"
- runFlow:
    when:
      visible:
        id: "auth-screen"
    commands:
      - extendedWaitUntil:
          visible:
            id: "auth-e2e-bypass-button"
          timeout: 15000
      - tapOn:
          text: "Continue locally"
          optional: true
      - tapOn:
          id: "auth-e2e-bypass-button"
          optional: true
      - tapOn:
          point: "50%,88%"
          optional: true
      - extendedWaitUntil:
          notVisible:
            id: "auth-screen"
          timeout: 15000
- runFlow:
    when:
      visible:
        id: "home-welcome-sheet"
    commands:
      - tapOn:
          id: "home-welcome-skip"
          optional: true
      - tapOn:
          id: "home-welcome-close"
          optional: true
- runFlow:
    when:
      visible:
        text: "Try it now"
    commands:
      - tapOn:
          id: "home-welcome-skip"
          optional: true
      - tapOn:
          id: "home-welcome-close"
          optional: true
- runFlow:
    when:
      visible:
        text: "Go Home"
    commands:
      - tapOn:
          text: "Go Home"
      - openLink: ${MAESTRO_EXPO_URL}
- runFlow:
    when:
      visible:
        text: "Go home"
    commands:
      - tapOn:
          text: "Go home"
      - openLink: ${MAESTRO_EXPO_URL}
- extendedWaitUntil:
    visible:
      id: "e2e-nav-rail"
    timeout: 45000
- tapOn:
    point: "9%,10%"
    optional: true
- runFlow:
    when:
      visible:
        id: "settings-screen"
    commands:
      - tapOn:
          id: "settings-close"
- runFlow:
    when:
      visible:
        id: "activity-screen"
    commands:
      - tapOn:
          id: "activity-close"
- runFlow:
    when:
      visible:
        id: "connections-screen"
    commands:
      - tapOn:
          id: "connections-close"
- runFlow:
    when:
      visible:
        id: "inbox-screen"
    commands:
      - tapOn:
          id: "inbox-close"
- extendedWaitUntil:
    visible:
      id: "e2e-nav-rail"
    timeout: 15000

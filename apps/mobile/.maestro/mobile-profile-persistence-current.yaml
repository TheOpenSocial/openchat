appId: ${MAESTRO_APP_ID}
---
- tapOn:
    point: "93%,43%"
    optional: true
- tapOn:
    text: "Minimize"
    optional: true
- tapOn:
    text: "Dismiss"
    optional: true
- tapOn:
    text: "Skip"
    optional: true
- tapOn:
    id: "settings-close"
    optional: true
- tapOn:
    id: "other-profile-close"
    optional: true
- tapOn:
    id: "intent-detail-close"
    optional: true
- tapOn:
    id: "chat-thread-close"
    optional: true
- tapOn:
    id: "inbox-close"
    optional: true
- tapOn:
    id: "connections-close"
    optional: true
- tapOn:
    id: "discovery-close"
    optional: true
- tapOn:
    id: "recurring-circles-close"
    optional: true
- tapOn:
    id: "saved-searches-close"
    optional: true
- tapOn:
    id: "scheduled-tasks-close"
    optional: true
- tapOn:
    id: "activity-close"
    optional: true
- extendedWaitUntil:
    visible:
      id: "e2e-nav-rail"
    timeout: 15000
- tapOn:
    id: "e2e-nav-profile"
- extendedWaitUntil:
    visible:
      id: "profile-screen"
    timeout: 15000
- runFlow:
    when:
      visible:
        id: "profile-action-edit"
    commands:
      - tapOn:
          id: "profile-action-edit"
- scrollUntilVisible:
    element:
      id: "profile-bio-input"
    direction: DOWN
    timeout: 15000
- tapOn:
    id: "profile-bio-input"
- eraseText
- inputText: "Maestro profile bio"
- tapOn:
    id: "profile-location-input"
- eraseText
- inputText: "Cordoba, Argentina"
- tapOn:
    id: "profile-bio-save"
- extendedWaitUntil:
    visible:
      text: "Cordoba, Argentina"
    timeout: 15000
- scrollUntilVisible:
    element:
      id: "profile-action-interests"
    direction: UP
    timeout: 15000
- tapOn:
    id: "profile-action-interests"
- tapOn:
    id: "profile-interests-input"
- eraseText
- inputText: "MaestroInterest, Design"
- pressKey: Enter
- scrollUntilVisible:
    element:
      id: "profile-interests-save"
    direction: DOWN
    timeout: 15000
- tapOn:
    id: "profile-interests-save"
- extendedWaitUntil:
    visible:
      text: "MaestroInterest"
    timeout: 15000

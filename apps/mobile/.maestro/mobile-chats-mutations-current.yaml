appId: ${MAESTRO_APP_ID}
---
- launchApp
- tapOn:
    text: "OpenSocial"
    optional: true
- openLink: ${MAESTRO_EXPO_URL}
- launchApp
- tapOn:
    text: "Expo Go"
    optional: true
- tapOn:
    text: "Open"
    optional: true
- tapOn:
    text: "OpenSocial"
    optional: true
- tapOn:
    text: "Reload"
    optional: true
- tapOn:
    text: "Continue"
    optional: true
- tapOn:
    text: "Minimize"
    optional: true
- tapOn:
    text: "Dismiss"
    optional: true
- tapOn:
    text: "Skip"
    optional: true
- tapOn:
    point: "91%,49%"
    optional: true
- tapOn:
    id: "settings-close"
    optional: true
- tapOn:
    id: "other-profile-close"
    optional: true
- tapOn:
    id: "intent-detail-close"
    optional: true
- tapOn:
    id: "chat-thread-close"
    optional: true
- tapOn:
    id: "inbox-close"
    optional: true
- tapOn:
    id: "connections-close"
    optional: true
- tapOn:
    id: "discovery-close"
    optional: true
- tapOn:
    id: "recurring-circles-close"
    optional: true
- tapOn:
    id: "saved-searches-close"
    optional: true
- tapOn:
    id: "scheduled-tasks-close"
    optional: true
- tapOn:
    id: "activity-close"
    optional: true
- runFlow:
    when:
      visible:
        id: "auth-screen"
    commands:
      - extendedWaitUntil:
          visible:
            id: "auth-e2e-bypass-button"
          timeout: 15000
      - tapOn:
          text: "Continue locally"
          optional: true
      - tapOn:
          id: "auth-e2e-bypass-button"
          optional: true
      - tapOn:
          point: "50%,88%"
          optional: true
- runFlow:
    when:
      visible:
        id: "auth-e2e-bypass-button"
    commands:
      - tapOn:
          text: "Continue locally"
          optional: true
      - tapOn:
          id: "auth-e2e-bypass-button"
          optional: true
      - tapOn:
          point: "50%,88%"
          optional: true
- extendedWaitUntil:
    notVisible:
      id: "auth-screen"
    timeout: 15000
- runFlow:
    when:
      visible:
        id: "home-welcome-sheet"
    commands:
      - tapOn:
          id: "home-welcome-skip"
          optional: true
      - tapOn:
          id: "home-welcome-close"
          optional: true
- runFlow:
    when:
      visible:
        text: "Try it now"
    commands:
      - tapOn:
          text: "Try it now"
          optional: true
      - tapOn:
          text: "Skip"
          optional: true
      - tapOn:
          point: "90%,88%"
          optional: true
      - tapOn:
          point: "91%,15%"
          optional: true
- extendedWaitUntil:
    notVisible:
      id: "home-welcome-sheet"
    timeout: 15000
- extendedWaitUntil:
    notVisible:
      text: "Try it now"
    timeout: 15000
- extendedWaitUntil:
    visible:
      id: "e2e-nav-rail"
    timeout: 15000
- runFlow:
    when:
      visible:
        id: "e2e-nav-chats"
    commands:
      - tapOn:
          id: "e2e-nav-chats"
- runFlow:
    when:
      visible:
        id: "app-bottom-tab-chats"
    commands:
      - tapOn:
          id: "app-bottom-tab-chats"
- extendedWaitUntil:
    visible:
      id: "chats-screen"
    timeout: 15000
- extendedWaitUntil:
    visible:
      id: "chat-thread-row-first"
    timeout: 15000
- tapOn:
    id: "chat-thread-row-first"
- extendedWaitUntil:
    visible:
      id: "chat-selected-thread"
    timeout: 15000
- assertVisible:
    id: "chat-bubble-e2e-msg-reply-1"
- longPressOn:
    id: "chat-bubble-e2e-msg-reply-1"
- runFlow:
    when:
      notVisible:
        text: "Edit"
    commands:
      - longPressOn:
          id: "chat-bubble-e2e-msg-reply-1"
- tapOn:
    text: "Edit"
- extendedWaitUntil:
    visible:
      id: "chat-edit-banner"
    timeout: 15000
- tapOn:
    id: "chat-message-input"
- eraseText
- inputText: "Edited from maestro"
- tapOn:
    id: "chat-send-button"
- tapOn:
    point: "50%,22%"
    optional: true
- extendedWaitUntil:
    visible:
      id: "chat-bubble-e2e-msg-reply-1"
    timeout: 15000
- extendedWaitUntil:
    notVisible:
      id: "chat-edit-banner"
    timeout: 15000
- tapOn:
    id: "chat-reaction-e2e-msg-reply-1-🔥"
- extendedWaitUntil:
    visible:
      text: "🔥 1"
    timeout: 15000
- longPressOn:
    id: "chat-bubble-e2e-msg-reply-1"
- runFlow:
    when:
      notVisible:
        text: "Delete message"
    commands:
      - longPressOn:
          id: "chat-bubble-e2e-msg-reply-1"
- tapOn:
    text: "Delete message"
- tapOn:
    text: "Delete"
    optional: true
- extendedWaitUntil:
    notVisible:
      text: "Edited from maestro"
    timeout: 15000

appId: ${MAESTRO_APP_ID}
---
- runFlow: subflows/boot-shell-current.yaml
- tapOn:
    id: "e2e-nav-home"
- assertVisible:
    id: "home-screen"
- tapOn:
    id: "e2e-nav-activity"
- runFlow:
    when:
      visible:
        id: "home-screen"
    commands:
      - tapOn:
          point: "16%,36%"
- assertVisible:
    id: "activity-screen"
- tapOn:
    id: "e2e-nav-inbox"
- assertVisible:
    id: "inbox-screen"
- tapOn:
    id: "e2e-nav-activity"
- assertVisible:
    id: "activity-screen"
- tapOn:
    id: "e2e-nav-connections"
- assertVisible:
    id: "connections-screen"
- tapOn:
    id: "e2e-nav-activity"
- assertVisible:
    id: "activity-screen"
- tapOn:
    id: "e2e-nav-discovery"
- assertVisible:
    id: "discovery-screen"
- tapOn:
    id: "e2e-nav-activity"
- assertVisible:
    id: "activity-screen"
- tapOn:
    id: "e2e-nav-recurring-circles"
- assertVisible:
    id: "recurring-circles-screen"
- tapOn:
    id: "e2e-nav-activity"
- assertVisible:
    id: "activity-screen"
- tapOn:
    id: "e2e-nav-saved-searches"
- assertVisible:
    id: "saved-searches-screen"
- tapOn:
    id: "e2e-nav-activity"
- assertVisible:
    id: "activity-screen"
- tapOn:
    id: "e2e-nav-scheduled-tasks"
- assertVisible:
    id: "scheduled-tasks-screen"
- tapOn:
    id: "e2e-nav-home"
- assertVisible:
    id: "home-screen"
- tapOn:
    id: "e2e-nav-profile"
- assertVisible:
    id: "profile-screen"
- tapOn:
    id: "e2e-nav-settings"
- assertVisible:
    id: "settings-screen"
- tapOn:
    id: "e2e-nav-profile"
- assertVisible:
    id: "profile-screen"

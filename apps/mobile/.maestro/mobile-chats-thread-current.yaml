appId: ${MAESTRO_APP_ID}
---
- tapOn:
    point: "93%,43%"
    optional: true
- tapOn:
    text: "Minimize"
    optional: true
- tapOn:
    text: "Dismiss"
    optional: true
- tapOn:
    text: "Skip"
    optional: true
- tapOn:
    id: "settings-close"
    optional: true
- tapOn:
    id: "other-profile-close"
    optional: true
- tapOn:
    id: "intent-detail-close"
    optional: true
- tapOn:
    id: "chat-thread-close"
    optional: true
- tapOn:
    id: "inbox-close"
    optional: true
- tapOn:
    id: "connections-close"
    optional: true
- tapOn:
    id: "discovery-close"
    optional: true
- tapOn:
    id: "recurring-circles-close"
    optional: true
- tapOn:
    id: "saved-searches-close"
    optional: true
- tapOn:
    id: "scheduled-tasks-close"
    optional: true
- tapOn:
    id: "activity-close"
    optional: true
- extendedWaitUntil:
    visible:
      id: "e2e-nav-rail"
    timeout: 15000
- runFlow:
    when:
      visible:
        id: "e2e-nav-chats"
    commands:
      - tapOn:
          id: "e2e-nav-chats"
- runFlow:
    when:
      visible:
        id: "app-bottom-tab-chats"
    commands:
      - tapOn:
          id: "app-bottom-tab-chats"
- extendedWaitUntil:
    visible:
      id: "chats-screen"
    timeout: 15000
- extendedWaitUntil:
    visible:
      id: "chat-thread-row-first"
    timeout: 15000
- tapOn:
    id: "chat-thread-row-first"
- extendedWaitUntil:
    visible:
      id: "chat-selected-thread"
    timeout: 15000
- assertVisible:
    id: "chat-message-input"
- assertVisible:
    id: "chat-send-button"
- longPressOn:
    id: "chat-bubble-e2e-msg-root"
- extendedWaitUntil:
    visible:
      id: "chat-reply-banner"
    timeout: 15000
- tapOn:
    text: "Clear"
- extendedWaitUntil:
    notVisible:
      id: "chat-reply-banner"
    timeout: 15000
- longPressOn:
    id: "chat-bubble-e2e-msg-root"
- extendedWaitUntil:
    visible:
      id: "chat-reply-banner"
    timeout: 15000
- tapOn:
    id: "chat-message-input"
- inputText: "Maestro reply coverage"
- tapOn:
    id: "chat-send-button"
- extendedWaitUntil:
    visible:
      text: "Maestro reply coverage"
    timeout: 15000
- extendedWaitUntil:
    notVisible:
      id: "chat-reply-banner"
    timeout: 15000
- tapOn:
    id: "chat-thread-open-e2e-msg-root"
- runFlow:
    when:
      notVisible:
        id: "chat-thread-modal"
    commands:
      - tapOn:
          text: "Thread \\(2\\)"
- extendedWaitUntil:
    visible:
      id: "chat-thread-modal"
    timeout: 15000
- assertVisible:
    id: "chat-thread-close"
- assertVisible:
    id: "thread-message-input"
- assertVisible:
    id: "thread-send-button"
- tapOn:
    id: "chat-thread-bubble-e2e-msg-root"
- extendedWaitUntil:
    visible:
      id: "other-profile-screen"
    timeout: 15000
- assertVisible:
    text: "Why you are seeing this"
- tapOn:
    id: "other-profile-close"
- extendedWaitUntil:
    visible:
      id: "chat-thread-modal"
    timeout: 15000
- tapOn:
    id: "thread-message-input"
- inputText: "Thread reply from maestro"
- tapOn:
    id: "thread-send-button"
- extendedWaitUntil:
    visible:
      text: "Thread reply from maestro"
    timeout: 15000
- tapOn:
    id: "chat-thread-close"
- extendedWaitUntil:
    visible:
      id: "chat-selected-thread"
    timeout: 15000

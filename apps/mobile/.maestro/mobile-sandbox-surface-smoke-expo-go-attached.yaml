appId: ${MAESTRO_APP_ID}
---
- runFlow: subflows/boot-home-expo-go-attached.yaml
- assertVisible:
    id: "home-status-header"
- assertVisible: ${MAESTRO_EXPECTED_HOME_STATUS_TITLE}

- tapOn:
    id: "app-bottom-tab-activity"
- assertVisible:
    id: "activity-screen"
- assertVisible: ${MAESTRO_EXPECTED_ACTIVITY_SECTION_TITLE}
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      id: "activity-open-inbox"
    timeout: 15000

- tapOn:
    id: "activity-open-inbox"
- assertVisible:
    id: "inbox-screen"
- waitForAnimationToEnd
- tapOn:
    id: "inbox-close"
- assertVisible:
    id: "activity-screen"
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      id: "activity-open-connections"
    timeout: 15000

- tapOn:
    id: "activity-open-connections"
- assertVisible:
    id: "connections-screen"
- waitForAnimationToEnd
- tapOn:
    id: "connections-close"
- assertVisible:
    id: "activity-screen"
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      id: "activity-open-discovery"
    timeout: 15000

- tapOn:
    id: "activity-open-discovery"
- assertVisible:
    id: "discovery-screen"
- waitForAnimationToEnd
- tapOn:
    id: "discovery-close"
- assertVisible:
    id: "activity-screen"
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      id: "activity-open-recurring-circles"
    timeout: 15000

- tapOn:
    id: "activity-open-recurring-circles"
- assertVisible:
    id: "recurring-circles-screen"
- waitForAnimationToEnd
- tapOn:
    id: "recurring-circles-close"
- assertVisible:
    id: "activity-screen"
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      id: "activity-open-saved-searches"
    timeout: 15000

- tapOn:
    id: "activity-open-saved-searches"
- assertVisible:
    id: "saved-searches-screen"
- waitForAnimationToEnd
- tapOn:
    id: "saved-searches-close"
- assertVisible:
    id: "activity-screen"
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      id: "activity-open-scheduled-tasks"
    timeout: 15000

- tapOn:
    id: "activity-open-scheduled-tasks"
- assertVisible:
    id: "scheduled-tasks-screen"
- waitForAnimationToEnd
- tapOn:
    id: "scheduled-tasks-close"
- assertVisible:
    id: "activity-screen"

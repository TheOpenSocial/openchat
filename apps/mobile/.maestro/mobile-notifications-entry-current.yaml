appId: ${MAESTRO_APP_ID}
---
- tapOn:
    point: "93%,43%"
    optional: true
- tapOn:
    text: "Minimize"
    optional: true
- tapOn:
    text: "Dismiss"
    optional: true
- tapOn:
    text: "Skip"
    optional: true
- tapOn:
    id: "settings-close"
    optional: true
- tapOn:
    id: "other-profile-close"
    optional: true
- tapOn:
    id: "intent-detail-close"
    optional: true
- tapOn:
    id: "chat-thread-close"
    optional: true
- tapOn:
    id: "inbox-close"
    optional: true
- tapOn:
    id: "connections-close"
    optional: true
- tapOn:
    id: "discovery-close"
    optional: true
- tapOn:
    id: "recurring-circles-close"
    optional: true
- tapOn:
    id: "saved-searches-close"
    optional: true
- tapOn:
    id: "scheduled-tasks-close"
    optional: true
- tapOn:
    id: "activity-close"
    optional: true
- extendedWaitUntil:
    visible:
      id: "e2e-nav-rail"
    timeout: 15000
- tapOn:
    id: "e2e-nav-home"
- extendedWaitUntil:
    visible:
      id: "home-screen"
    timeout: 15000
- tapOn:
    id: "app-shell-notifications"
- extendedWaitUntil:
    visible:
      id: "activity-close"
    timeout: 15000
- assertVisible:
    text: "What needs your attention"

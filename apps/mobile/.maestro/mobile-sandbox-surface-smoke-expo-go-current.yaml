appId: ${MAESTRO_APP_ID}
---
- runFlow: subflows/boot-activity-expo-go-attached.yaml
- assertVisible:
    id: "activity-screen"
- assertVisible: ${MAESTRO_EXPECTED_ACTIVITY_SECTION_TITLE}
- assertVisible:
    id: "activity-quick-links"

- tapOn:
    id: "activity-open-inbox"
- assertVisible:
    id: "inbox-screen"
- tapOn:
    id: "inbox-close"
- runFlow: subflows/return-to-activity-expo-go-current.yaml

- scrollUntilVisible:
    element:
      id: "activity-open-connections"
    direction: DOWN
    visibilityPercentage: 20
    speed: 45
    centerElement: false
    waitToSettleTimeoutMs: 500
    timeout: 25000
- tapOn:
    id: "activity-open-connections"
- assertVisible:
    id: "connections-screen"
- tapOn:
    id: "connections-close"
- runFlow: subflows/return-to-activity-expo-go-current.yaml

- scrollUntilVisible:
    element:
      id: "activity-open-discovery"
    direction: DOWN
    visibilityPercentage: 20
    speed: 45
    centerElement: false
    waitToSettleTimeoutMs: 500
    timeout: 25000
- tapOn:
    id: "activity-open-discovery"
- assertVisible:
    id: "discovery-screen"
- tapOn:
    id: "discovery-close"
- runFlow: subflows/return-to-activity-expo-go-current.yaml

- scrollUntilVisible:

- tapOn:
    id: "recurring-circles-close"
- runFlow: subflows/return-to-activity-expo-go-current.yaml

- scrollUntilVisible:
    element:
      id: "activity-open-saved-searches"
    direction: DOWN
    visibilityPercentage: 20
    speed: 45
    centerElement: false
    waitToSettleTimeoutMs: 500
    timeout: 25000
- tapOn:
    id: "activity-open-saved-searches"
- assertVisible:
    id: "saved-searches-screen"
- tapOn:
    id: "saved-searches-close"
- runFlow: subflows/return-to-activity-expo-go-current.yaml

- scrollUntilVisible:
    element:
      id: "activity-open-scheduled-tasks"
    direction: DOWN
    visibilityPercentage: 20
    speed: 45
    centerElement: false
    waitToSettleTimeoutMs: 500
    timeout: 25000
- tapOn:
    id: "activity-open-scheduled-tasks"
- assertVisible:
    id: "scheduled-tasks-screen"
- tapOn:
    id: "scheduled-tasks-close"
- runFlow: subflows/return-to-activity-expo-go-current.yaml

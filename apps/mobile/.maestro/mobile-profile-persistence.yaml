appId: ${MAESTRO_APP_ID}
---
- runFlow: subflows/boot-home-local.yaml
- tapOn:
    id: "app-bottom-tab-profile"
- extendedWaitUntil:
    visible:
      id: "profile-screen"
    timeout: 15000
- assertVisible:
    id: "profile-screen"
- tapOn:
    id: "profile-action-edit"
- tapOn:
    id: "profile-bio-input"
- eraseText
- inputText: "Maestro profile bio"
- tapOn:
    id: "profile-location-input"
- eraseText
- inputText: "Cordoba, Argentina"
- tapOn:
    id: "profile-bio-save"
- assertVisible: "Cordoba, Argentina"
- tapOn:
    id: "profile-action-interests"
- tapOn:
    id: "profile-interests-input"
- eraseText
- inputText: "MaestroInterest, Design"
- tapOn:
    id: "profile-interests-save"
- assertVisible: "MaestroInterest"
- tapOn:
    id: "app-bottom-tab-home"
- assertVisible:
    id: "home-screen"
- tapOn:
    id: "app-bottom-tab-profile"
- assertVisible:
    id: "profile-screen"
- assertVisible: "Cordoba, Argentina"
- assertVisible: "MaestroInterest"

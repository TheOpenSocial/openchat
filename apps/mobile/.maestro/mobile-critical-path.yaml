appId: ${MAESTRO_APP_ID}
---
- runFlow: subflows/boot-shell-current.yaml
- assertVisible:
    id: "home-screen"
- tapOn:
    id: "e2e-nav-activity"
- extendedWaitUntil:
    visible:
      id: "activity-screen"
    timeout: 15000
- assertVisible:
    id: "activity-screen"
- tapOn:
    id: "e2e-nav-home"
- extendedWaitUntil:
    visible:
      id: "home-screen"
    timeout: 15000
- assertVisible:
    id: "home-screen"
- tapOn:
    id: "e2e-nav-profile"
- extendedWaitUntil:
    visible:
      id: "profile-screen"
    timeout: 15000
- tapOn:
    id: "e2e-nav-chats"
- extendedWaitUntil:
    visible:
      id: "chats-screen"
    timeout: 15000
- runFlow:
    when:
      visible:
        id: "chat-thread-row-first"
    commands:
      - tapOn:
          id: "chat-thread-row-first"
      - extendedWaitUntil:
          visible:
            id: "chat-selected-thread"
          timeout: 15000
- runFlow:
    when:
      visible:
        id: "chat-empty-state"
    commands:
      - assertVisible:
          id: "chat-empty-state"

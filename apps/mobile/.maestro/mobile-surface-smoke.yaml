appId: ${MAESTRO_APP_ID}
---
- runFlow: subflows/boot-home-local.yaml
- assertVisible:
    id: "home-screen"

- runFlow: subflows/boot-home-local.yaml
- tapOn:
    id: "app-bottom-tab-activity"
- assertVisible:
    id: "activity-screen"

- runFlow: subflows/boot-home-local.yaml
- tapOn:
    id: "app-bottom-tab-activity"
- assertVisible:
    id: "activity-screen"
- tapOn:
    id: "activity-open-inbox"
- assertVisible:
    id: "inbox-screen"

- runFlow: subflows/boot-home-local.yaml
- tapOn:
    id: "app-bottom-tab-activity"
- assertVisible:
    id: "activity-screen"
- tapOn:
    id: "activity-open-connections"
- assertVisible:
    id: "connections-screen"

- runFlow: subflows/boot-home-local.yaml
- tapOn:
    id: "app-bottom-tab-activity"
- assertVisible:
    id: "activity-screen"
- tapOn:
    id: "activity-open-discovery"
- assertVisible:
    id: "discovery-screen"

- runFlow: subflows/boot-home-local.yaml
- tapOn:
    id: "app-bottom-tab-activity"
- assertVisible:
    id: "activity-screen"
- tapOn:
    id: "activity-open-recurring-circles"
- assertVisible:
    id: "recurring-circles-screen"

- runFlow: subflows/boot-home-local.yaml
- tapOn:
    id: "app-bottom-tab-activity"
- assertVisible:
    id: "activity-screen"
- tapOn:
    id: "activity-open-saved-searches"
- assertVisible:
    id: "saved-searches-screen"

- runFlow: subflows/boot-home-local.yaml
- tapOn:
    id: "app-bottom-tab-activity"
- assertVisible:
    id: "activity-screen"
- tapOn:
    id: "activity-open-scheduled-tasks"
- assertVisible:
    id: "scheduled-tasks-screen"

- runFlow: subflows/boot-home-local.yaml
- tapOn:
    id: "app-shell-settings"
- assertVisible:
    id: "settings-close"

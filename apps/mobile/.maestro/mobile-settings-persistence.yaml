appId: ${MAESTRO_APP_ID}
---
- runFlow: subflows/boot-home-local.yaml
- tapOn:
    id: "app-bottom-tab-profile"
- extendedWaitUntil:
    visible:
      id: "profile-screen"
    timeout: 15000
- tapOn:
    id: "app-shell-settings"
- extendedWaitUntil:
    visible:
      id: "settings-screen"
    timeout: 15000
- assertVisible:
    id: "settings-screen"
- tapOn:
    id: "settings-first-name-input"
- eraseText
- inputText: "Taylor"
- tapOn:
    id: "settings-last-name-input"
- eraseText
- inputText: "Rivera"
- tapOn:
    id: "settings-save-button"
- assertVisible: "Taylor"
- assertVisible: "Rivera"
- tapOn:
    id: "settings-close"
- assertVisible:
    id: "profile-screen"
- tapOn:
    id: "app-shell-settings"
- assertVisible:
    id: "settings-screen"
- assertVisible: "Taylor"
- assertVisible: "Rivera"
- assertVisible:
    id: "settings-protocol-panel"

appId: ${MAESTRO_APP_ID}
---
- runFlow: subflows/boot-home-local.yaml
- tapOn:
    id: "app-shell-settings"
- extendedWaitUntil:
    visible:
      id: "settings-screen"
    timeout: 15000
- assertVisible:
    id: "settings-screen"
- tapOn:
    id: "settings-first-name-input"
- eraseText
- inputText: "Maestro"
- tapOn:
    id: "settings-last-name-input"
- eraseText
- inputText: "Settings"
- tapOn:
    id: "settings-save-button"
- waitForAnimationToEnd
- tapOn:
    id: "settings-close"
- tapOn:
    id: "app-shell-settings"
- extendedWaitUntil:
    visible:
      id: "settings-screen"
    timeout: 15000
- assertVisible:
    id: "settings-protocol-panel"
- assertVisible:
    id: "settings-first-name-input"
- assertVisible:
    text: "Maestro"
- assertVisible:
    id: "settings-last-name-input"
- assertVisible:
    text: "Settings"

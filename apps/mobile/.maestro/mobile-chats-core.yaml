appId: ${MAESTRO_APP_ID}
---
- runFlow: subflows/boot-home-local.yaml
- tapOn:
    id: "app-bottom-tab-chats"
    optional: true
- tapOn:
    point: "16%,96%"
    optional: true
- extendedWaitUntil:
    visible:
      id: "chats-screen"
    timeout: 15000
- assertVisible:
    id: "chats-screen"
- runFlow:
    when:
      visible:
        id: "chat-thread-row-first"
    commands:
      - tapOn:
          id: "chat-thread-row-first"
      - extendedWaitUntil:
          visible:
            id: "chat-selected-thread"
          timeout: 15000
      - assertVisible:
          id: "chat-message-input"
      - assertVisible:
          id: "chat-send-button"
- runFlow:
    when:
      visible:
        text: "No chats yet"
    commands:
      - assertVisible:
          text: "No chats yet"

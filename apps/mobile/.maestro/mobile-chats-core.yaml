appId: ${MAESTRO_APP_ID}
---
- runFlow: subflows/boot-home-local.yaml
- tapOn:
    id: "app-bottom-tab-chats"
- extendedWaitUntil:
    visible:
      id: "chats-screen"
    timeout: 20000
- assertVisible:
    id: "chats-screen"
- runFlow:
    when:
      visible:
        id: "chat-thread-row-first"
    commands:
      - tapOn:
          id: "chat-thread-row-first"
      - assertVisible:
          id: "chat-selected-thread"
      - assertVisible:
          id: "chat-message-input"
      - inputText: "Maestro says hi"
      - assertVisible:
          id: "chat-send-button"
- runFlow:
    when:
      visible:
        text: "No chats yet"
    commands:
      - assertVisible: "No chats yet"

appId: ${MAESTRO_APP_ID}
---
- runFlow: "subflows/boot-shell-current.yaml"
- assertVisible:
    id: "home-screen"
- extendedWaitUntil:
    visible:
      id: "app-shell-notifications-unread-indicator"
    timeout: 20000
- assertVisible:
    id: "app-shell-notifications-unread-indicator"
- tapOn:
    id: "e2e-nav-activity"
- extendedWaitUntil:
    visible:
      id: "activity-screen"
    timeout: 15000
- assertVisible:
    id: "activity-screen"
- tapOn:
    id: "e2e-nav-home"
- extendedWaitUntil:
    visible:
      id: "home-screen"
    timeout: 15000

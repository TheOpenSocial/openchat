appId: ${MAESTRO_APP_ID}
---
- runFlow: "subflows/boot-shell-current.yaml"
- tapOn:
    id: "e2e-nav-profile"
- extendedWaitUntil:
    visible:
      id: "profile-screen"
    timeout: 15000
- tapOn:
    id: "profile-avatar-trigger"
- extendedWaitUntil:
    visible:
      id: "profile-avatar-updated"
    timeout: 30000
- assertVisible:
    id: "profile-avatar-updated"

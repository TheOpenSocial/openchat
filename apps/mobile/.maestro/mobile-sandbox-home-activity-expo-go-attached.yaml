appId: ${MAESTRO_APP_ID}
---
- runFlow: subflows/boot-home-expo-go-attached.yaml
- assertVisible:
    id: "home-status-header"
- tapOn:
    id: "app-bottom-tab-activity"
- waitForAnimationToEnd
- tapOn:
    id: "app-bottom-tab-activity"
    optional: true
- assertVisible:
    id: "activity-screen"
- assertVisible: ${MAESTRO_EXPECTED_ACTIVITY_SECTION_TITLE}

- assertVisible:
    id: "home-status-header"
- assertVisible: ${MAESTRO_EXPECTED_HOME_STATUS_TITLE}

- tapOn:
    id: "app-bottom-tab-activity"
- assertVisible:
    id: "activity-screen"
- assertVisible: ${MAESTRO_EXPECTED_ACTIVITY_SECTION_TITLE}

- tapOn:
    id: "activity-open-inbox"
- assertVisible:
    id: "inbox-screen"

- runFlow: subflows/boot-home-native.yaml
- tapOn:
    id: "app-bottom-tab-activity"
- assertVisible:
    id: "activity-screen"
- tapOn:
    id: "activity-open-connections"
- assertVisible:
    id: "connections-screen"

- runFlow: subflows/boot-home-native.yaml
- tapOn:
    id: "app-bottom-tab-activity"
- assertVisible:
    id: "activity-screen"
- tapOn:
    id: "activity-open-discovery"
- assertVisible:
    id: "discovery-screen"

- runFlow: subflows/boot-home-native.yaml

appId: ${MAESTRO_APP_ID}
---
- assertVisible:
    id: "activity-screen"
- assertVisible: ${MAESTRO_EXPECTED_ACTIVITY_SECTION_TITLE}
- waitForAnimationToEnd
- scrollUntilVisible:
    element:
      text: "Quick links"
    direction: DOWN
    visibilityPercentage: 20
    speed: 45
    centerElement: false
    waitToSettleTimeoutMs: 500
    timeout: 25000
- assertVisible: "Quick links"
- assertVisible:
    id: ${MAESTRO_ACTIVITY_TARGET_ID}
- waitForAnimationToEnd
- tapOn:
    id: ${MAESTRO_ACTIVITY_TARGET_ID}
- assertVisible:
    id: ${MAESTRO_ACTIVITY_TARGET_SCREEN_ID}
- waitForAnimationToEnd
- tapOn:
    id: ${MAESTRO_ACTIVITY_TARGET_CLOSE_ID}
- assertVisible:
    id: "activity-screen"

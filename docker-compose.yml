services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: opensocial-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: opensocial
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7.4-alpine
    container_name: opensocial-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    container_name: opensocial-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  mailhog:
    image: mailhog/mailhog:latest
    container_name: opensocial-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: opensocial-otel
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./docs/otel/collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4317:4317"
      - "4318:4318"

volumes:
  postgres_data:
  redis_data:
  minio_data:
